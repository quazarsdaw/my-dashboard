<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Профиль</title>
<script src="gamification.js"></script>
<script src="firebase-sync.js?v=5" defer></script>
<script src="topbar.js?v=6" defer></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --card-bg: rgba(255,255,255,0.04);
  --card-radius: 16px;
}
html { background: #050506; }
body {
  font-family: var(--font-sans); color: var(--text-primary);
  background: #050506; min-height: 100vh;
  max-width: 1100px; margin: 0 auto; padding: 0 16px 40px;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background:
    radial-gradient(ellipse 50% 50% at 82% 14%, rgba(224,118,88,0.16), transparent),
    radial-gradient(ellipse 50% 50% at 18% 90%, rgba(180,180,200,0.06), transparent);
  filter: blur(40px); animation: bgDrift 36s ease-in-out infinite alternate;
}
@keyframes bgDrift { 0% { transform: translate(0,0); } 100% { transform: translate(-12px,8px); } }
body::after {
  content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg width='3' height='3' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='white' fill-opacity='0.014'/%3E%3C/svg%3E");
  background-repeat: repeat;
}
.page-title {
  font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 16px 0 8px;
}

/* Profile hero */
.profile-hero {
  background: linear-gradient(135deg, rgba(192,132,252,0.12) 0%, rgba(125,211,252,0.08) 100%);
  border: 1px solid rgba(192,132,252,0.15);
  border-radius: var(--card-radius); padding: 28px 24px;
  margin-bottom: 24px; text-align: center;
}
.avatar-wrap {
  position: relative; display: inline-block; margin-bottom: 16px; cursor: pointer;
}
.avatar {
  width: 88px; height: 88px; border-radius: 50%;
  background: rgba(255,255,255,0.06); border: 2px solid rgba(192,132,252,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 44px; line-height: 1; transition: border-color 0.2s;
}
.avatar-wrap:hover .avatar { border-color: rgba(192,132,252,0.6); }
.avatar-edit {
  position: absolute; bottom: 2px; right: 2px;
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(192,132,252,0.25); border: 1px solid rgba(192,132,252,0.4);
  color: #fff; font-size: 13px; display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.profile-name {
  font-size: 22px; font-weight: 700; margin-bottom: 4px;
  cursor: pointer; transition: color 0.15s;
}
.profile-name:hover { color: var(--warning); }
.profile-joined {
  font-size: 12px; color: var(--text-tertiary); margin-bottom: 18px;
}

/* Overall level ring */
.level-ring-wrap {
  display: flex; align-items: center; justify-content: center; gap: 20px;
  margin-bottom: 6px;
}
.level-ring { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
.level-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.level-ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 6; }
.level-ring-fg { fill: none; stroke: url(#lvlGrad); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
.level-ring-center {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.level-ring-num { font-size: 28px; font-weight: 800; font-family: var(--font-mono); }
.level-ring-label { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-tertiary); text-transform: uppercase; }
.level-info {
  text-align: left;
}
.level-info-xp {
  font-size: 14px; font-family: var(--font-mono); color: var(--text-secondary); margin-bottom: 4px;
}
.level-info-next {
  font-size: 12px; color: var(--text-tertiary);
}

/* Stats grid */
.stats-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  margin-bottom: 24px;
}
@media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
.stat-card {
  background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 16px 14px; text-align: center;
}
.stat-value {
  font-size: 24px; font-weight: 800; font-family: var(--font-mono);
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.stat-label { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

/* Spheres breakdown */
.section-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-tertiary); margin: 28px 0 14px; padding-left: 4px;
  display: flex; align-items: center; gap: 10px;
}
.section-eyebrow::before, .section-eyebrow::after {
  content: ''; flex: 0 0 20px; height: 1px; background: rgba(255,255,255,0.1);
}
.section-eyebrow::after { flex: 1; }
.sphere-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 8px;
}
.sphere-icon { font-size: 22px; flex-shrink: 0; }
.sphere-details { flex: 1; min-width: 0; }
.sphere-name-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.sphere-name { font-size: 14px; font-weight: 600; }
.sphere-lvl { font-size: 12px; font-weight: 700; font-family: var(--font-mono); color: var(--text-secondary); }
.sphere-bar-bg { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
.sphere-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.sphere-xp-text { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 3px; }

/* Achievements wall */
.ach-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;
  margin-bottom: 24px;
}
.ach-card {
  background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 16px 12px; text-align: center;
  transition: border-color 0.2s, transform 0.15s;
}
.ach-card.locked { opacity: 0.35; }
.ach-card.unlocked {
  border-color: rgba(242,192,99,0.2);
  background: linear-gradient(135deg, rgba(242,192,99,0.06) 0%, rgba(255,149,89,0.04) 100%);
}
.ach-icon { font-size: 32px; margin-bottom: 8px; }
.ach-name { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
.ach-desc { font-size: 10px; color: var(--text-tertiary); line-height: 1.4; }
.ach-date { font-size: 9px; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 6px; }

/* Activity log */
.log-list { margin-bottom: 24px; }
.log-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.log-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.log-text { flex: 1; font-size: 13px; color: var(--text-secondary); }
.log-time { font-size: 12px; font-family: var(--font-mono); color: var(--text-tertiary); white-space: nowrap; }
.log-empty { text-align: center; padding: 24px; color: var(--text-tertiary); font-size: 13px; }

/* Coin history */
.coin-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.coin-reason { font-size: 13px; color: var(--text-secondary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.coin-amount { font-size: 13px; font-family: var(--font-mono); font-weight: 700; white-space: nowrap; margin-left: 12px; }
.coin-amount.earn { color: var(--success); }
.coin-amount.spend { color: var(--danger); }
.coin-date { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); margin-left: 10px; white-space: nowrap; }

.show-more-btn {
  display: block; width: 100%; padding: 12px; margin-top: 8px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; color: var(--text-secondary); font-size: 13px;
  font-family: var(--font-sans); cursor: pointer; text-align: center;
}
.show-more-btn:active { transform: scale(0.98); }

/* Edit modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #1a1a1c; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 28px 24px; max-width: 340px; width: 100%;
}
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; text-align: center; }
.modal-label { font-size: 12px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.modal-input {
  width: 100%; padding: 12px 14px; border-radius: 12px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-primary); font-size: 15px; font-family: var(--font-sans);
  outline: none; margin-bottom: 16px;
}
.modal-input:focus { border-color: rgba(192,132,252,0.4); }
.emoji-picker {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center;
}
.emoji-opt {
  width: 44px; height: 44px; border-radius: 12px;
  background: rgba(255,255,255,0.04); border: 2px solid transparent;
  font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.15s;
}
.emoji-opt:hover { background: rgba(255,255,255,0.08); }
.emoji-opt.selected { border-color: rgba(192,132,252,0.5); background: rgba(192,132,252,0.12); }
.modal-actions { display: flex; gap: 10px; }
.modal-btn {
  flex: 1; padding: 12px; border-radius: 12px; border: none;
  font-size: 14px; font-weight: 700; font-family: var(--font-sans); cursor: pointer;
  transition: transform 0.1s;
}
.modal-btn:active { transform: scale(0.96); }
.modal-btn-cancel { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
.modal-btn-save { background: linear-gradient(180deg, #C084FC 0%, #9333EA 100%); color: #fff; }

/* Reset data */
.danger-zone {
  margin-top: 32px; padding: 20px; border-radius: var(--card-radius);
  border: 1px solid rgba(255,107,107,0.15); background: rgba(255,107,107,0.04);
}
.danger-title { font-size: 13px; font-weight: 700; color: var(--danger); margin-bottom: 8px; }
.danger-text { font-size: 12px; color: var(--text-tertiary); margin-bottom: 14px; line-height: 1.5; }
.danger-btn {
  padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(255,107,107,0.3);
  background: rgba(255,107,107,0.1); color: var(--danger); font-size: 13px;
  font-weight: 700; font-family: var(--font-sans); cursor: pointer;
}
.danger-btn:active { transform: scale(0.96); }

@media (max-width: 480px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-card { padding: 12px 10px; }
  .stat-value { font-size: 20px; }
  .ach-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .profile-hero { padding: 22px 18px; }
  .level-ring-wrap { gap: 14px; }
  .level-ring { width: 80px; height: 80px; }
  .level-ring-num { font-size: 22px; }
}
</style>
</head>
<body>

<h1 class="page-title">Профиль</h1>

<!-- Hero card -->
<div class="profile-hero">
  <div class="avatar-wrap" id="avatarWrap" title="Изменить профиль">
    <div class="avatar" id="avatarEmoji"></div>
    <div class="avatar-edit">&#9998;</div>
  </div>
  <div class="profile-name" id="profileName" title="Изменить имя"></div>
  <div class="profile-joined" id="profileJoined"></div>

  <div class="level-ring-wrap">
    <div class="level-ring">
      <svg viewBox="0 0 120 120">
        <defs>
          <linearGradient id="lvlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C084FC"/>
            <stop offset="100%" stop-color="#7DD3FC"/>
          </linearGradient>
        </defs>
        <circle class="level-ring-bg" cx="60" cy="60" r="52"/>
        <circle class="level-ring-fg" id="levelRingFg" cx="60" cy="60" r="52"/>
      </svg>
      <div class="level-ring-center">
        <div class="level-ring-num" id="levelNum">1</div>
        <div class="level-ring-label">level</div>
      </div>
    </div>
    <div class="level-info">
      <div class="level-info-xp" id="levelXpText"></div>
      <div class="level-info-next" id="levelNextText"></div>
    </div>
  </div>
</div>

<!-- Stats -->
<div class="stats-grid" id="statsGrid"></div>

<!-- Spheres breakdown -->
<div class="section-eyebrow">Сферы развития</div>
<div id="spheresList"></div>

<!-- Achievements -->
<div class="section-eyebrow">Достижения</div>
<div class="ach-grid" id="achGrid"></div>

<!-- Activity log -->
<div class="section-eyebrow">Последняя активность</div>
<div class="log-list" id="logList"></div>

<!-- Coin history -->
<div class="section-eyebrow">История монет</div>
<div id="coinHistory"></div>

<!-- Danger zone -->
<div class="danger-zone">
  <div class="danger-title">Сброс данных</div>
  <div class="danger-text">Удалит все данные геймификации: уровни, монеты, достижения, историю задач и таймера. Это действие нельзя отменить.</div>
  <button class="danger-btn" id="resetBtn">Сбросить всё</button>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-title">Редактировать профиль</div>
    <div class="modal-label">Имя</div>
    <input class="modal-input" id="editName" type="text" maxlength="24" placeholder="Игрок">
    <div class="modal-label">Аватар</div>
    <div class="emoji-picker" id="emojiPicker"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="editCancel">Отмена</button>
      <button class="modal-btn modal-btn-save" id="editSave">Сохранить</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';
  var G = window.Gamification;

  var AVATAR_OPTIONS = ['🧑‍💻','👨‍💻','👩‍💻','🧙‍♂️','🧙‍♀️','🦸‍♂️','🦸‍♀️','🥷','👾','🤖','🐉','🦊','🐺','🦁','🐻','🦅','🐬','🔥','⚡','💎','🎯','🏆','🚀','🌟'];

  function formatNum(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 10000) return (n / 1000).toFixed(1) + 'K';
    return String(n);
  }

  function formatDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }

  function formatShortDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    return d.getDate() + ' ' + months[d.getMonth()];
  }

  function formatTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  function pluralMinutes(n) {
    if (n >= 60) {
      var h = Math.floor(n / 60), m = n % 60;
      return h + 'ч' + (m ? ' ' + m + 'м' : '');
    }
    return n + ' мин';
  }

  // --- Render hero ---
  function renderHero() {
    var profile = G.getProfile();
    document.getElementById('avatarEmoji').textContent = profile.avatar || '🧑‍💻';
    document.getElementById('profileName').textContent = profile.name || 'Игрок';

    var stats = G.getTotalStats();
    var joinText = stats.firstDay ? 'С ' + formatDate(stats.firstDay) : 'Новый игрок';
    document.getElementById('profileJoined').textContent = joinText;

    var spheres = G.getSpheres();
    var overall = G.getOverallLevel(spheres);
    document.getElementById('levelNum').textContent = overall.level;

    var circ = 2 * Math.PI * 52;
    var pct = overall.xpNeeded > 0 ? overall.xpInLevel / overall.xpNeeded : (overall.level >= G.MAX_LEVEL ? 1 : 0);
    var ring = document.getElementById('levelRingFg');
    ring.style.strokeDasharray = circ;
    ring.style.strokeDashoffset = circ * (1 - pct);

    var xpText = document.getElementById('levelXpText');
    var nextText = document.getElementById('levelNextText');
    if (overall.level >= G.MAX_LEVEL) {
      xpText.textContent = formatNum(overall.totalXp) + ' XP всего';
      nextText.textContent = 'Максимальный уровень!';
    } else {
      xpText.textContent = formatNum(overall.xpInLevel) + ' / ' + formatNum(overall.xpNeeded) + ' XP';
      nextText.textContent = 'До уровня ' + (overall.level + 1);
    }
  }

  // --- Stats ---
  function renderStats() {
    var stats = G.getTotalStats();
    var coins = G.getCoins();
    var achievements = G.getAchievements();
    var unlocked = Object.keys(achievements.unlocked || {}).length;

    var items = [
      { value: stats.totalTasks, label: 'Задач' },
      { value: pluralMinutes(stats.totalMinutes), label: 'Времени' },
      { value: stats.totalDays, label: 'Дней' },
      { value: formatNum(coins.earned), label: 'Заработано 🪙' },
      { value: formatNum(coins.spent), label: 'Потрачено 🪙' },
      { value: coins.balance, label: 'Баланс 🪙' },
      { value: unlocked + '/' + G.ACHIEVEMENT_DEFS.length, label: 'Трофеи' },
      { value: G.getActivityLog().length, label: 'Сессий' },
    ];
    var grid = document.getElementById('statsGrid');
    grid.innerHTML = '';
    items.forEach(function (it) {
      var card = document.createElement('div');
      card.className = 'stat-card';
      card.innerHTML = '<div class="stat-value">' + it.value + '</div><div class="stat-label">' + it.label + '</div>';
      grid.appendChild(card);
    });
  }

  // --- Spheres ---
  function renderSpheres() {
    var spheresData = G.getSpheres();
    var list = document.getElementById('spheresList');
    list.innerHTML = '';
    G.SPHERES.forEach(function (s) {
      var data = spheresData[s.id] || { xp: 0 };
      var info = G.getLevelInfo(data.xp);
      var pct = info.xpNeeded > 0 ? Math.min(100, (info.xpInLevel / info.xpNeeded) * 100) : (info.level >= G.MAX_LEVEL ? 100 : 0);
      var row = document.createElement('div');
      row.className = 'sphere-row';
      row.innerHTML =
        '<div class="sphere-icon">' + s.icon + '</div>' +
        '<div class="sphere-details">' +
          '<div class="sphere-name-row"><span class="sphere-name">' + s.name + '</span><span class="sphere-lvl">LVL ' + info.level + '</span></div>' +
          '<div class="sphere-bar-bg"><div class="sphere-bar-fill" style="width:' + pct + '%;background:' + s.color + '"></div></div>' +
          '<div class="sphere-xp-text">' + formatNum(info.xpInLevel) + ' / ' + formatNum(info.xpNeeded) + ' XP</div>' +
        '</div>';
      list.appendChild(row);
    });
  }

  // --- Achievements ---
  function renderAchievements() {
    var achievements = G.getAchievements();
    var grid = document.getElementById('achGrid');
    grid.innerHTML = '';
    G.ACHIEVEMENT_DEFS.forEach(function (a) {
      var unlocked = !!achievements.unlocked[a.id];
      var card = document.createElement('div');
      card.className = 'ach-card ' + (unlocked ? 'unlocked' : 'locked');
      card.innerHTML =
        '<div class="ach-icon">' + a.icon + '</div>' +
        '<div class="ach-name">' + a.name + '</div>' +
        '<div class="ach-desc">' + a.desc + '</div>' +
        (unlocked ? '<div class="ach-date">' + formatShortDate(achievements.unlocked[a.id]) + '</div>' : '');
      grid.appendChild(card);
    });
  }

  // --- Activity log ---
  function renderLog() {
    var log = G.getActivityLog();
    var container = document.getElementById('logList');
    container.innerHTML = '';
    if (log.length === 0) {
      container.innerHTML = '<div class="log-empty">Пока нет записей. Запусти таймер или выполни задачу.</div>';
      return;
    }
    var shown = Math.min(log.length, 10);
    for (var i = 0; i < shown; i++) {
      var entry = log[i];
      var sphere = G.SPHERES.find(function (s) { return s.id === entry.sphereId; });
      var item = document.createElement('div');
      item.className = 'log-item';
      item.innerHTML =
        '<div class="log-dot" style="background:' + (sphere ? sphere.color : '#666') + '"></div>' +
        '<div class="log-text">' + (entry.label || (sphere ? sphere.name : 'Активность')) + '</div>' +
        '<div class="log-time">' + entry.minutes + ' мин &middot; ' + formatShortDate(entry.startTime) + ' ' + formatTime(entry.startTime) + '</div>';
      container.appendChild(item);
    }
    if (log.length > 10) {
      var btn = document.createElement('button');
      btn.className = 'show-more-btn';
      btn.textContent = 'Показать все (' + log.length + ')';
      btn.addEventListener('click', function () {
        container.innerHTML = '';
        log.forEach(function (entry) {
          var sphere = G.SPHERES.find(function (s) { return s.id === entry.sphereId; });
          var item = document.createElement('div');
          item.className = 'log-item';
          item.innerHTML =
            '<div class="log-dot" style="background:' + (sphere ? sphere.color : '#666') + '"></div>' +
            '<div class="log-text">' + (entry.label || (sphere ? sphere.name : 'Активность')) + '</div>' +
            '<div class="log-time">' + entry.minutes + ' мин &middot; ' + formatShortDate(entry.startTime) + ' ' + formatTime(entry.startTime) + '</div>';
          container.appendChild(item);
        });
      });
      container.appendChild(btn);
    }
  }

  // --- Coin history ---
  function renderCoinHistory() {
    var coins = G.getCoins();
    var container = document.getElementById('coinHistory');
    container.innerHTML = '';
    if (!coins.history || coins.history.length === 0) {
      container.innerHTML = '<div class="log-empty">Пока нет транзакций.</div>';
      return;
    }
    var shown = Math.min(coins.history.length, 15);
    for (var i = 0; i < shown; i++) {
      var h = coins.history[i];
      var row = document.createElement('div');
      row.className = 'coin-row';
      var sign = h.type === 'earn' ? '+' : '-';
      row.innerHTML =
        '<div class="coin-reason">' + (h.reason || '') + '</div>' +
        '<div class="coin-amount ' + h.type + '">' + sign + h.amount + ' 🪙</div>' +
        '<div class="coin-date">' + formatShortDate(h.date) + '</div>';
      container.appendChild(row);
    }
    if (coins.history.length > 15) {
      var btn = document.createElement('button');
      btn.className = 'show-more-btn';
      btn.textContent = 'Показать все (' + coins.history.length + ')';
      btn.addEventListener('click', function () {
        container.innerHTML = '';
        coins.history.forEach(function (h) {
          var row = document.createElement('div');
          row.className = 'coin-row';
          var sign = h.type === 'earn' ? '+' : '-';
          row.innerHTML =
            '<div class="coin-reason">' + (h.reason || '') + '</div>' +
            '<div class="coin-amount ' + h.type + '">' + sign + h.amount + ' 🪙</div>' +
            '<div class="coin-date">' + formatShortDate(h.date) + '</div>';
          container.appendChild(row);
        });
      });
      container.appendChild(btn);
    }
  }

  // --- Edit modal ---
  var selectedEmoji = '';
  function openEditModal() {
    var profile = G.getProfile();
    document.getElementById('editName').value = profile.name || 'Игрок';
    selectedEmoji = profile.avatar || '🧑‍💻';
    renderEmojiPicker();
    document.getElementById('editModal').classList.add('open');
  }
  function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
  }
  function renderEmojiPicker() {
    var picker = document.getElementById('emojiPicker');
    picker.innerHTML = '';
    AVATAR_OPTIONS.forEach(function (emoji) {
      var opt = document.createElement('button');
      opt.className = 'emoji-opt' + (emoji === selectedEmoji ? ' selected' : '');
      opt.textContent = emoji;
      opt.type = 'button';
      opt.addEventListener('click', function () {
        selectedEmoji = emoji;
        renderEmojiPicker();
      });
      picker.appendChild(opt);
    });
  }

  document.getElementById('avatarWrap').addEventListener('click', openEditModal);
  document.getElementById('profileName').addEventListener('click', openEditModal);
  document.getElementById('editCancel').addEventListener('click', closeEditModal);
  document.getElementById('editModal').addEventListener('click', function (e) {
    if (e.target === this) closeEditModal();
  });
  document.getElementById('editSave').addEventListener('click', function () {
    var name = document.getElementById('editName').value.trim() || 'Игрок';
    G.setProfile({ name: name, avatar: selectedEmoji });
    closeEditModal();
    renderAll();
  });

  // --- Reset ---
  document.getElementById('resetBtn').addEventListener('click', function () {
    if (!confirm('Точно сбросить ВСЕ данные геймификации? Это нельзя отменить.')) return;
    if (!confirm('Последнее предупреждение. Все уровни, монеты и достижения будут удалены.')) return;
    // Nuke everything dashboard-related
    var keep = []; // nothing to keep
    var allKeys = Object.keys(localStorage);
    allKeys.forEach(function (k) { localStorage.removeItem(k); });
    window.location.reload();
  });

  function renderAll() {
    renderHero();
    renderStats();
    renderSpheres();
    renderAchievements();
    renderLog();
    renderCoinHistory();
  }

  renderAll();
  window.addEventListener('gamification-update', renderAll);
})();
</script>
</body>
</html>
