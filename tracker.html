<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#111315">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="app-icon.svg">
<title>Трекер привычек</title>
<script src="gamification.js?v=3"></script>
<script src="firebase-sync.js?v=22" defer></script>
<script src="topbar.js?v=6" defer></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --text-primary:#FAFAFA;--text-secondary:#B8B6B0;--text-tertiary:#76746E;
  --success:#6BE3A4;--warning:#F2C063;--danger:#FF6B6B;
  --card-bg:rgba(255,255,255,0.04);--card-radius:16px;
}
html{background:#0A0B0D}
body{font-family:var(--font-sans);color:var(--text-primary);background:#0A0B0D;
  min-height:100vh;max-width:1100px;margin:0 auto;padding:0 16px 40px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:radial-gradient(ellipse 50% 50% at 82% 14%,rgba(224,118,88,0.16),transparent),
  radial-gradient(ellipse 50% 50% at 18% 90%,rgba(180,180,200,0.06),transparent);
  filter:blur(40px);animation:bgDrift 36s ease-in-out infinite alternate}
@keyframes bgDrift{0%{transform:translate(0,0)}100%{transform:translate(-12px,8px)}}
body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg width='3' height='3' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='white' fill-opacity='0.014'/%3E%3C/svg%3E");background-repeat:repeat}

.page-title{font-size:28px;font-weight:700;letter-spacing:-0.025em;
  background:linear-gradient(180deg,#FFF 0%,#C7C4BC 120%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:16px 0 8px}
.page-sub{font-size:12px;color:var(--text-tertiary);margin-bottom:18px}

/* Score bar */
.score-bar{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:14px 18px;
  background:var(--card-bg);border-radius:var(--card-radius);border:1px solid rgba(255,255,255,0.04)}
.score-num{font-size:32px;font-weight:800;font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.score-num.positive{color:var(--success)}
.score-num.negative{color:var(--danger)}
.score-num.zero{color:var(--text-tertiary)}
.score-label{font-size:11px;color:var(--text-tertiary);font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.streak-badge{margin-left:auto;padding:6px 14px;border-radius:10px;font-size:12px;font-weight:700;font-family:var(--font-mono);white-space:nowrap}
.streak-badge.good{background:rgba(107,227,164,0.1);color:var(--success);border:1px solid rgba(107,227,164,0.15)}
.streak-badge.bad{background:rgba(255,107,107,0.1);color:var(--danger);border:1px solid rgba(255,107,107,0.15)}

/* Unified scale control */
.scale-controls{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.scale-btn{padding:7px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.03);color:var(--text-tertiary);font-size:11px;font-weight:700;
  font-family:var(--font-mono);cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.scale-btn.active{background:rgba(255,255,255,0.1);color:var(--text-primary);border-color:rgba(255,255,255,0.15)}
.scale-btn:hover{background:rgba(255,255,255,0.08)}
.nav-arrows{display:flex;gap:4px;margin-left:auto}
.nav-arrow{width:34px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);color:var(--text-primary);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background 0.15s,transform 0.1s;
  -webkit-tap-highlight-color:transparent;font-family:var(--font-sans)}
.nav-arrow:active{transform:scale(0.9)}
.nav-arrow:hover{background:rgba(255,255,255,0.08)}
.nav-arrow.disabled{opacity:0.3;pointer-events:none}
.nav-label{font-size:11px;font-weight:600;color:var(--text-tertiary);font-family:var(--font-mono);
  font-variant-numeric:tabular-nums;white-space:nowrap}
.nav-today{padding:6px 12px;border-radius:8px;border:1px solid rgba(242,192,99,0.2);
  background:rgba(242,192,99,0.08);color:var(--warning);font-size:11px;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;font-family:var(--font-sans);transition:background 0.15s}

/* Section */
.section-title{font-size:10.5px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--text-tertiary);display:flex;align-items:center;gap:12px;margin:20px 0 10px}
.section-title::before{content:'';width:18px;height:1px;background:var(--text-tertiary);opacity:0.6}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.08),transparent)}

/* Chart */
.chart-card{background:var(--card-bg);border-radius:var(--card-radius);border:1px solid rgba(255,255,255,0.04);
  padding:16px;margin-bottom:16px;overflow:hidden}
.chart-title{font-size:14px;font-weight:700;color:var(--text-secondary);margin-bottom:10px}
.chart-svg{width:100%;display:block}

/* Habit grid — normal mode */
.habit-table{width:100%;border-collapse:separate;border-spacing:0;margin-bottom:16px}
.habit-table th,.habit-table td{padding:0;text-align:center;vertical-align:middle}
.habit-name-cell{text-align:left!important;padding:8px 10px!important;font-size:13px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;
  position:sticky;left:0;z-index:2;background:#0a0a0b}
.habit-date-header{font-size:9px;font-weight:700;color:var(--text-tertiary);letter-spacing:0.04em;
  padding:4px 2px!important;min-width:36px;font-family:var(--font-mono)}
.habit-date-header.today{color:var(--warning)}
.habit-cell{width:36px;height:36px;padding:2px!important}
.habit-dot{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);
  cursor:pointer;transition:background 0.15s,border-color 0.15s,transform 0.1s;
  background:rgba(255,255,255,0.02);-webkit-tap-highlight-color:transparent;display:block;margin:0 auto}
.habit-dot:active{transform:scale(0.85)}
.habit-dot.done{background:rgba(107,227,164,0.35);border-color:rgba(107,227,164,0.4)}
.habit-dot.bad-done{background:rgba(255,107,107,0.35);border-color:rgba(255,107,107,0.4)}
.habit-dot.half{background:rgba(242,192,99,0.25);border-color:rgba(242,192,99,0.3)}
.habit-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px}

/* Compact mode (90+ days) */
.compact .habit-name-cell{max-width:100px;font-size:11px;padding:4px 8px!important}
.compact .habit-date-header{min-width:14px;font-size:0;padding:1px!important;height:14px}
.compact .habit-date-header.show-label{font-size:7px}
.compact .habit-cell{width:14px;height:14px;padding:1px!important}
.compact .habit-dot{width:12px;height:12px;border-radius:3px;border-width:0}

/* Ultra compact (365+) */
.ultra-compact .habit-name-cell{max-width:80px;font-size:10px;padding:2px 6px!important}
.ultra-compact .habit-date-header{min-width:8px;font-size:0;padding:0!important;height:8px}
.ultra-compact .habit-cell{width:8px;height:8px;padding:0!important}
.ultra-compact .habit-dot{width:7px;height:7px;border-radius:2px;border-width:0}

.habit-del{background:none;border:none;color:var(--text-tertiary);font-size:14px;cursor:pointer;opacity:0;
  transition:opacity 0.15s;padding:0 6px;vertical-align:middle}
.habit-name-cell:hover .habit-del{opacity:1}
@media(pointer:coarse){.habit-del{opacity:0.5}}
.habit-del:hover{color:var(--danger)}

/* Add habit */
.add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.add-input{flex:1;min-width:140px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);color:var(--text-primary);font-size:14px;font-family:var(--font-sans);outline:none}
.add-input:focus{border-color:rgba(255,255,255,0.2)}
.add-input::placeholder{color:var(--text-tertiary)}
.add-btn{padding:10px 20px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(180deg,#FFF 0%,#E8E5DD 100%);color:#0A0A0B;
  font-size:13px;font-weight:700;font-family:var(--font-sans);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.8),0 2px 8px rgba(0,0,0,0.3);
  transition:transform 0.1s;white-space:nowrap}
.add-btn:hover{transform:translateY(-1px)}
.add-select{padding:10px 10px;border-radius:10px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);color:var(--text-primary);font-size:12px;font-weight:600;
  cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;font-family:var(--font-sans)}
.penalty-tag{font-size:9px;font-weight:700;color:var(--danger);opacity:0.6;margin-left:4px;font-family:var(--font-mono)}

/* Day score row */
.day-score-cell{font-size:10px;font-weight:700;font-family:var(--font-mono);padding:4px 2px!important}
.day-score-cell.pos{color:var(--success)}
.day-score-cell.neg{color:var(--danger)}
.day-score-cell.zer{color:var(--text-tertiary)}
.compact .day-score-cell{font-size:0;height:14px}
.ultra-compact .day-score-cell{font-size:0;height:8px}

@media(max-width:480px){
  .page-title{font-size:22px}
  .score-num{font-size:24px}
  .habit-name-cell{max-width:100px;font-size:12px;padding:6px 8px!important}
  .habit-dot{width:28px;height:28px;border-radius:7px}
  .habit-cell{width:32px;height:32px}
  .habit-date-header{min-width:32px;font-size:8px}
  .add-row{flex-direction:column}
  .add-input{width:100%}
  .scale-controls{gap:4px}
  .scale-btn{padding:5px 10px;font-size:10px}
}
</style>
</head>
<body>

<h1 class="page-title">Трекер</h1>
<div class="page-sub">Тапни на ячейку — зелёная для хороших, красная для плохих привычек</div>

<!-- Today's score -->
<div class="score-bar">
  <div>
    <div class="score-num" id="todayScore">0</div>
    <div class="score-label">Итог за сегодня</div>
  </div>
  <div class="streak-badge good" id="streakBadge" style="display:none"></div>
</div>

<!-- Unified scale + nav -->
<div class="scale-controls">
  <button class="scale-btn" data-scale="14">14д</button>
  <button class="scale-btn active" data-scale="30">30д</button>
  <button class="scale-btn" data-scale="90">90д</button>
  <button class="scale-btn" data-scale="180">180д</button>
  <button class="scale-btn" data-scale="365">Год</button>
  <button class="scale-btn" data-scale="0">Всё</button>
  <div class="nav-arrows">
    <button class="nav-arrow" id="navPrev" title="Назад">◀</button>
    <button class="nav-arrow" id="navNext" title="Вперёд">▶</button>
    <button class="nav-today" id="navToday">Сегодня</button>
  </div>
</div>
<div class="nav-label" id="navLabel" style="margin-bottom:12px">—</div>

<!-- Chart -->
<div class="chart-card">
  <div class="chart-title">📈 Накопленные очки</div>
  <svg id="scoreChart" class="chart-svg" viewBox="0 0 600 140" preserveAspectRatio="none"></svg>
</div>

<!-- Good habits -->
<div class="section-title">Хорошие привычки</div>
<div class="add-row">
  <input class="add-input" id="addGoodInput" type="text" placeholder="Новая привычка…" autocomplete="off">
  <button class="add-btn" id="addGoodBtn">+ Добавить</button>
</div>
<div class="habit-scroll" id="goodScroll"><table class="habit-table" id="goodTable"></table></div>

<!-- Bad habits -->
<div class="section-title">Плохие привычки</div>
<div class="add-row">
  <input class="add-input" id="addBadInput" type="text" placeholder="Вредная привычка…" autocomplete="off">
  <select class="add-select" id="addBadSev">
    <option value="light">Лёгкая (−5🪙)</option>
    <option value="medium" selected>Средняя (−10🪙)</option>
    <option value="heavy">Тяжёлая (−20🪙)</option>
  </select>
  <button class="add-btn" id="addBadBtn">+ Добавить</button>
</div>
<div class="habit-scroll" id="badScroll"><table class="habit-table" id="badTable"></table></div>

<script>
(function(){
  'use strict';
  var G = window.Gamification;

  /* === State === */
  var scale = 30;       // days shown (0 = all time)
  var offset = 0;       // 0 = ends today

  var DEFAULT_GOOD = [
    'режим сна','задачи на завтра','зарядка','5к шагов','английский',
    'изучал/воркал','читал','дневник','зал','контрастный душ','1.5л воды','планка'
  ];
  var DEFAULT_BAD = [
    'сахар','фастфуд','просмотр хуйни','бухал','порно','компы','вредная еда'
  ];

  // Penalty coins per severity
  var PENALTY_COINS = { light: 5, medium: 10, heavy: 20 };
  var PENALTY_LABELS = { light: '−5', medium: '−10', heavy: '−20' };

  /* === Date helpers === */
  function dateKey(d){
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function today(){ return dateKey(new Date()); }
  function addDays(d,n){ var r = new Date(d); r.setDate(r.getDate()+n); return r; }
  function daysBetween(a,b){ return Math.round((b-a)/86400000); }

  function getEffectiveScale(){
    if(scale === 0){
      // All time: find earliest mark
      var data = getData();
      var earliest = today();
      Object.keys(data.marks).forEach(function(k){
        var d = k.split(':')[1];
        if(d && d < earliest) earliest = d;
      });
      var diff = daysBetween(new Date(earliest), new Date()) + 1;
      return Math.max(14, diff);
    }
    return scale;
  }

  function getDates(){
    var s = getEffectiveScale();
    var dates = [];
    var end = addDays(new Date(), -offset);
    var start = addDays(end, -(s - 1));
    for(var i = 0; i < s; i++){
      dates.push(dateKey(addDays(start, i)));
    }
    return dates;
  }

  function shortDate(iso){
    var parts = iso.split('-');
    var d = parseInt(parts[2],10);
    var m = parseInt(parts[1],10);
    var months = ['','янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    return d+'\n'+months[m];
  }
  function shortDateInline(iso){
    var parts = iso.split('-');
    var d = parseInt(parts[2],10);
    var m = parseInt(parts[1],10);
    var months = ['','янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
    return d+' '+months[m];
  }
  function isToday(iso){ return iso === today(); }

  function getCompactMode(){
    var s = getEffectiveScale();
    if(s >= 365) return 'ultra-compact';
    if(s >= 90) return 'compact';
    return '';
  }

  /* === Data === */
  function getData(){
    var d = G.storeGet('tracker_v1');
    if(!d){
      d = { good: DEFAULT_GOOD.map(function(n,i){ return {id:'g'+i,name:n}; }),
            bad: DEFAULT_BAD.map(function(n,i){ return {id:'b'+i,name:n}; }),
            marks: {} };
      G.storeSet('tracker_v1', d);
    }
    return d;
  }
  function setData(d){ G.storeSet('tracker_v1', d); }
  function getMarkKey(habitId, dateStr){ return habitId + ':' + dateStr; }

  /* === Score === */
  function calcDayScore(data, dateStr){
    var score = 0;
    data.good.forEach(function(h){
      var v = data.marks[getMarkKey(h.id, dateStr)];
      if(v === 1) score++;
      else if(v === 0.5) score += 0.5;
    });
    data.bad.forEach(function(h){
      var v = data.marks[getMarkKey(h.id, dateStr)];
      if(v === 1) score--;
    });
    return score;
  }

  function calcStreak(data){
    var t = new Date();
    var goodStreak = 0, badStreak = 0;
    for(var i = 1; i <= 365; i++){
      var s = calcDayScore(data, dateKey(addDays(t, -i)));
      if(s > 0 && badStreak === 0) goodStreak++;
      else if(s < 0 && goodStreak === 0) badStreak++;
      else break;
    }
    return { good: goodStreak, bad: badStreak };
  }

  /* === Nav label === */
  function updateNavLabel(){
    var dates = getDates();
    var first = dates[0], last = dates[dates.length - 1];
    document.getElementById('navLabel').textContent = shortDateInline(first) + ' — ' + shortDateInline(last) + '  (' + dates.length + ' дн.)';
    var nextBtn = document.getElementById('navNext');
    nextBtn.classList.toggle('disabled', offset <= 0);
  }

  /* === Render table === */
  function renderTable(tableId, scrollId, habits, type, data, dates){
    var table = document.getElementById(tableId);
    var scrollEl = document.getElementById(scrollId);
    var mode = getCompactMode();
    scrollEl.className = 'habit-scroll ' + mode;
    table.innerHTML = '';
    if(habits.length === 0){
      table.innerHTML = '<tr><td style="padding:14px;color:var(--text-tertiary);font-size:12px">Нет привычек</td></tr>';
      return;
    }

    var isCompact = mode !== '';
    var labelEvery = isCompact ? (mode === 'ultra-compact' ? 30 : 7) : 1;

    var thead = document.createElement('thead');
    var hr = document.createElement('tr');
    hr.innerHTML = '<th class="habit-name-cell" style="background:#0A0B0D"></th>';
    dates.forEach(function(d, idx){
      var th = document.createElement('th');
      var showLabel = !isCompact || (idx % labelEvery === 0);
      th.className = 'habit-date-header' + (isToday(d) ? ' today' : '') + (showLabel && isCompact ? ' show-label' : '');
      if(!isCompact) th.innerHTML = shortDate(d).replace('\n','<br>');
      else if(showLabel) th.textContent = parseInt(d.split('-')[2],10);
      hr.appendChild(th);
    });
    thead.appendChild(hr);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    habits.forEach(function(h, idx){
      var tr = document.createElement('tr');
      var nameCell = document.createElement('td');
      nameCell.className = 'habit-name-cell';
      var penaltyTag = '';
      if(type === 'bad'){
        var sev = h.severity || 'medium';
        penaltyTag = '<span class="penalty-tag">' + (PENALTY_LABELS[sev] || '−10') + '🪙</span>';
      }
      nameCell.innerHTML = h.name + penaltyTag + '<button class="habit-del" data-idx="'+idx+'" data-type="'+type+'" title="Удалить">×</button>';
      tr.appendChild(nameCell);

      dates.forEach(function(d){
        var td = document.createElement('td');
        td.className = 'habit-cell';
        var dot = document.createElement('div');
        dot.className = 'habit-dot';
        var mk = getMarkKey(h.id, d);
        var val = data.marks[mk] || 0;
        if(type === 'good'){
          if(val === 1) dot.classList.add('done');
          else if(val === 0.5) dot.classList.add('half');
        } else {
          if(val === 1) dot.classList.add('bad-done');
        }
        dot.dataset.habit = h.id;
        dot.dataset.date = d;
        dot.dataset.type = type;
        dot.addEventListener('click', function(){
          toggleMark(this.dataset.habit, this.dataset.date, this.dataset.type);
        });
        td.appendChild(dot);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    // Day score footer (only in normal mode)
    if(!isCompact){
      var footTr = document.createElement('tr');
      footTr.innerHTML = '<td class="habit-name-cell" style="font-size:10px;color:var(--text-tertiary);font-weight:700;background:#0A0B0D">ИТОГ</td>';
      dates.forEach(function(d){
        var td = document.createElement('td');
        var s = calcDayScore(data, d);
        var cls = s > 0 ? 'pos' : s < 0 ? 'neg' : 'zer';
        td.className = 'day-score-cell ' + cls;
        td.textContent = s > 0 ? '+' + s : s;
        footTr.appendChild(td);
      });
      tbody.appendChild(footTr);
    }

    table.appendChild(tbody);

    // Delete handlers
    table.querySelectorAll('.habit-del').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        var data = getData();
        var arr = btn.dataset.type === 'good' ? data.good : data.bad;
        arr.splice(parseInt(btn.dataset.idx, 10), 1);
        setData(data);
        renderAll();
      });
    });
  }

  function toggleMark(habitId, dateStr, type){
    var data = getData();
    var mk = getMarkKey(habitId, dateStr);
    var current = data.marks[mk] || 0;
    if(type === 'good'){
      if(current === 0) data.marks[mk] = 1;
      else if(current === 1) data.marks[mk] = 0.5;
      else { delete data.marks[mk]; }
    } else {
      if(current === 0){
        data.marks[mk] = 1;
        // Find habit severity and deduct coins
        var habit = null;
        data.bad.forEach(function(h){ if(h.id === habitId) habit = h; });
        var sev = (habit && habit.severity) || 'medium';
        var cost = PENALTY_COINS[sev] || 10;
        G.spendCoins(cost, '💀 ' + (habit ? habit.name : 'Штраф'), true);
        window.dispatchEvent(new CustomEvent('gamification-update'));
      } else {
        delete data.marks[mk];
        // Refund penalty on uncheck
        var habit = null;
        data.bad.forEach(function(h){ if(h.id === habitId) habit = h; });
        var sev = (habit && habit.severity) || 'medium';
        var cost = PENALTY_COINS[sev] || 10;
        G.earnCoins(cost, '↩️ Отмена: ' + (habit ? habit.name : 'штраф'));
        window.dispatchEvent(new CustomEvent('gamification-update'));
      }
    }
    setData(data);
    renderAll();
  }

  function renderScore(){
    var data = getData();
    var score = calcDayScore(data, today());
    var el = document.getElementById('todayScore');
    el.textContent = (score > 0 ? '+' : '') + score;
    el.className = 'score-num ' + (score > 0 ? 'positive' : score < 0 ? 'negative' : 'zero');

    var streak = calcStreak(data);
    var badge = document.getElementById('streakBadge');
    if(streak.good > 1){
      badge.style.display = '';
      badge.className = 'streak-badge good';
      badge.textContent = '🔥 ' + streak.good + ' дн. подряд';
    } else if(streak.bad > 1){
      badge.style.display = '';
      badge.className = 'streak-badge bad';
      badge.textContent = '💀 ' + streak.bad + ' дн. проеб';
    } else {
      badge.style.display = 'none';
    }
  }

  /* === Chart === */
  function renderChart(){
    var svg = document.getElementById('scoreChart');
    var data = getData();
    var chartDays = getEffectiveScale();
    var W = 600, H = 140, padT = 18, padB = 20;
    var plotH = H - padT - padB;

    var scores = [];
    var labels = [];
    var now = new Date();
    var cumulative = 0;
    for(var i = chartDays - 1; i >= 0; i--){
      var d = addDays(now, -i - offset);
      var dk = dateKey(d);
      cumulative += calcDayScore(data, dk);
      scores.push(cumulative);
      labels.push(dk);
    }

    var maxAbs = Math.max(1, Math.max.apply(null, scores.map(function(s){ return Math.abs(s); })));
    maxAbs = Math.ceil(maxAbs);

    function yPos(val){
      var norm = val / maxAbs;
      return padT + plotH / 2 - norm * (plotH / 2);
    }
    function xPos(i){
      return (i / (scores.length - 1 || 1)) * W;
    }

    var parts = [];
    var zy = yPos(0);

    // Zero line
    parts.push('<line x1="0" y1="'+zy+'" x2="'+W+'" y2="'+zy+'" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>');
    parts.push('<text x="4" y="'+(padT+6)+'" fill="rgba(107,227,164,0.4)" font-size="9" font-family="var(--font-mono)">+'+maxAbs+'</text>');
    parts.push('<text x="4" y="'+(H-padB+12)+'" fill="rgba(255,107,107,0.4)" font-size="9" font-family="var(--font-mono)">-'+maxAbs+'</text>');

    if(scores.length > 1){
      // Positive area
      var posPath = 'M'+xPos(0)+','+zy;
      for(var i = 0; i < scores.length; i++){
        posPath += ' L'+xPos(i)+','+Math.min(zy, yPos(scores[i]));
      }
      posPath += ' L'+xPos(scores.length-1)+','+zy+' Z';
      parts.push('<path d="'+posPath+'" fill="rgba(107,227,164,0.08)"/>');

      // Negative area
      var negPath = 'M'+xPos(0)+','+zy;
      for(var i = 0; i < scores.length; i++){
        negPath += ' L'+xPos(i)+','+Math.max(zy, yPos(scores[i]));
      }
      negPath += ' L'+xPos(scores.length-1)+','+zy+' Z';
      parts.push('<path d="'+negPath+'" fill="rgba(255,107,107,0.08)"/>');

      // Line
      var linePath = 'M'+xPos(0)+','+yPos(scores[0]);
      for(var i = 1; i < scores.length; i++){
        linePath += ' L'+xPos(i)+','+yPos(scores[i]);
      }
      parts.push('<path d="'+linePath+'" fill="none" stroke="url(#scoreGrad)" stroke-width="1.5" stroke-linejoin="round"/>');
    }

    // Dots (skip in large ranges)
    if(chartDays <= 90){
      for(var i = 0; i < scores.length; i++){
        if(scores[i] !== 0){
          var color = scores[i] > 0 ? '#6BE3A4' : '#FF6B6B';
          parts.push('<circle cx="'+xPos(i)+'" cy="'+yPos(scores[i])+'" r="2" fill="'+color+'"/>');
        }
      }
    }

    // X-axis labels
    var labelCount = Math.min(8, scores.length);
    var labelStep = Math.max(1, Math.floor(scores.length / labelCount));
    for(var i = 0; i < scores.length; i += labelStep){
      var lbl = shortDateInline(labels[i]);
      var isT = labels[i] === today();
      parts.push('<text x="'+xPos(i)+'" y="'+(H-2)+'" fill="'+(isT?'#F2C063':'rgba(255,255,255,0.25)')+'" font-size="8" font-family="var(--font-mono)" text-anchor="middle" font-weight="'+(isT?'700':'400')+'">'+lbl+'</text>');
    }

    var defs = '<defs><linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="0">';
    defs += '<stop offset="0%" stop-color="#6BE3A4" stop-opacity="0.6"/>';
    defs += '<stop offset="50%" stop-color="#F2C063" stop-opacity="0.8"/>';
    defs += '<stop offset="100%" stop-color="#FF6B6B" stop-opacity="0.6"/>';
    defs += '</linearGradient></defs>';

    svg.innerHTML = defs + parts.join('');
  }

  /* === Render all === */
  function renderAll(){
    var data = getData();
    var dates = getDates();
    renderTable('goodTable', 'goodScroll', data.good, 'good', data, dates);
    renderTable('badTable', 'badScroll', data.bad, 'bad', data, dates);
    renderScore();
    updateNavLabel();
    renderChart();

    // Scroll to right (most recent)
    document.querySelectorAll('.habit-scroll').forEach(function(el){ el.scrollLeft = el.scrollWidth; });
  }

  /* === Add habits === */
  function addHabit(type, name, severity){
    if(!name) return;
    var data = getData();
    var arr = type === 'good' ? data.good : data.bad;
    var entry = { id: type[0] + '_' + Date.now(), name: name };
    if(type === 'bad') entry.severity = severity || 'medium';
    arr.push(entry);
    setData(data);
    renderAll();
  }

  document.getElementById('addGoodBtn').addEventListener('click', function(){
    var inp = document.getElementById('addGoodInput');
    addHabit('good', inp.value.trim());
    inp.value = '';
  });
  document.getElementById('addGoodInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('addGoodBtn').click();
  });
  document.getElementById('addBadBtn').addEventListener('click', function(){
    var inp = document.getElementById('addBadInput');
    var sev = document.getElementById('addBadSev').value;
    addHabit('bad', inp.value.trim(), sev);
    inp.value = '';
  });
  document.getElementById('addBadInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('addBadBtn').click();
  });

  /* === Scale + Nav === */
  document.querySelectorAll('.scale-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      scale = parseInt(this.dataset.scale, 10);
      offset = 0; // reset to today when changing scale
      document.querySelectorAll('.scale-btn').forEach(function(b){ b.classList.remove('active'); });
      this.classList.add('active');
      renderAll();
    });
  });

  document.getElementById('navPrev').addEventListener('click', function(){
    offset += getEffectiveScale();
    renderAll();
  });
  document.getElementById('navNext').addEventListener('click', function(){
    offset = Math.max(0, offset - getEffectiveScale());
    renderAll();
  });
  document.getElementById('navToday').addEventListener('click', function(){
    offset = 0;
    renderAll();
  });

  /* === Init === */
  renderAll();
})();
</script>
</body>
</html>
