<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#1C1E24">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="app-icon.svg">
<title>Dashboard</title>
<script src="gamification.js?v=7"></script>
<script src="supabase-sync.js?v=26-sb" defer></script>
<script src="topbar.js?v=19" defer></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --text-primary: #FAFAFA; --text-secondary: #D1D1D1; --text-tertiary: #A0A0A0;
  --success: #6BE3A4; --warning: #F2C063; --danger: #FF6B6B;
  --card-bg: rgba(255,255,255,0.09); --card-radius: 16px;
}
html { background: #1C1E24; scrollbar-gutter: stable; }
body { font-family: var(--font-sans); color: var(--text-primary); background: #1C1E24; min-height: 100vh; max-width: 1100px; margin: 0 auto; -webkit-font-smoothing: antialiased; }

body::before { content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none; background: radial-gradient(ellipse 50% 50% at 82% 14%, rgba(192,132,252,0.12), transparent), radial-gradient(ellipse 50% 50% at 18% 90%, rgba(125,211,252,0.08), transparent); filter: blur(40px); animation: bgDrift 36s ease-in-out infinite alternate; }
@keyframes bgDrift { 0% { transform: translate(0,0); } 100% { transform: translate(-12px,8px); } }
body::after { content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg width='3' height='3' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='white' fill-opacity='0.014'/%3E%3C/svg%3E"); background-repeat: repeat; }

.dash-title { font-size: 28px; font-weight: 700; letter-spacing: -0.025em; background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin: 16px 0 8px; }

/* --- Ticker --- */
.ticker-row { margin-bottom: 18px; }
.goal-ticker { display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-radius: 12px; background: linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.30) 100%), repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.07); position: relative; overflow: hidden; }
.goal-ticker-led-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: #6BE3A4; box-shadow: 0 0 8px rgba(107,227,164,0.7); animation: ledPulse 1.6s ease-in-out infinite; }
@keyframes ledPulse { 50% { opacity: 0.45; transform: scale(0.85); } }
.goal-ticker-label { font-family: var(--font-mono); font-size: 9.5px; font-weight: 800; letter-spacing: 0.18em; color: var(--text-tertiary); text-transform: uppercase; flex-shrink: 0; }
.goal-ticker-stage { flex: 1; height: 22px; position: relative; overflow: hidden; }
.goal-ticker-row { position: absolute; inset: 0; display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 12.5px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text-primary); white-space: nowrap; opacity: 1; transition: opacity 0.22s ease; }
.goal-ticker-row.is-fading { opacity: 0; }
.goal-ticker-status { width: 18px; text-align: center; flex-shrink: 0; }
.goal-ticker-text { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.goal-ticker-meta { font-family: var(--font-mono); font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text-secondary); letter-spacing: 0.04em; padding: 3px 8px; border-radius: 999px; background: rgba(255,255,255,0.07); flex-shrink: 0; }

/* --- Pomodoro --- */
.pomo-card { background: var(--card-bg); border-radius: var(--card-radius); padding: 16px 18px; margin-bottom: 18px; display: flex; align-items: center; gap: 16px; border: 1px solid rgba(255,255,255,0.07); }
.pomo-btn { width: 42px; height: 42px; border-radius: 12px; border: none; cursor: pointer; font-size: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
.pomo-time-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--text-tertiary); font-size: 10px; font-weight: 700; padding: 4px 8px; cursor: pointer; }
.pomo-time-btn.active { background: rgba(107,227,164,0.15); color: var(--success); border-color: rgba(107,227,164,0.3); }

/* --- Main Layout --- */
.main-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
@media (min-width: 900px) { .main-grid { grid-template-columns: 1fr 340px; } }

/* --- Day Ring --- */
.day-ring-wrap { display: flex; align-items: center; justify-content: center; gap: 26px; flex-wrap: wrap; margin-bottom: 24px; }
.day-ring-container { width: 168px; height: 168px; position: relative; }
.day-ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.7s ease; }

/* --- Today Section --- */
.gm-card { background: var(--card-bg); border-radius: var(--card-radius); padding: 18px 22px; backdrop-filter: blur(24px); box-shadow: 0 12px 40px rgba(0,0,0,0.45); margin-bottom: 16px; }
.gm-progress-num { font-size: 42px; font-weight: 700; }

/* --- Goals List --- */
.goal-list { list-style: none; }
.goal-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; margin-bottom: 6px; background: rgba(255,255,255,0.035); border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
.goal-cb-visual { width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; }
.goal-cb:checked + .goal-cb-visual { background: #6BE3A4; border-color: #6BE3A4; }
.goal-cb:checked + .goal-cb-visual::after { content: '✓'; color: #1C1E24; font-weight: 800; }
.goal-text { flex: 1; font-size: 14px; color: var(--text-primary); }
.goal-row.done .goal-text { text-decoration: line-through; opacity: 0.5; }

/* Modal Detail Styles */
.task-details-modal { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); align-items: center; justify-content: center; padding: 20px; }
.task-details-modal.show { display: flex; }
.tdm-box { background: #1C1E24; border-radius: 24px; padding: 24px; max-width: 440px; width: 100%; border: 1px solid rgba(255,255,255,0.14); box-shadow: 0 24px 60px rgba(0,0,0,0.6); }
.tdm-textarea { width: 100%; height: 100px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; padding: 12px; font-family: inherit; font-size: 14px; outline: none; margin-bottom: 16px; }
.subtask-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.subtask-input { flex: 1; background: none; border: none; color: #fff; font-size: 13px; border-bottom: 1px solid transparent; }
.subtask-input:focus { border-color: var(--text-tertiary); outline: none; }
.subtask-counter { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); margin-left: 6px; }
.btn-detail { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 14px; padding: 4px; opacity: 0.6; }
.btn-detail:hover { opacity: 1; }

</style>
</head>
<body>

<h1 class="dash-title">My Dashboard</h1>

<!-- Ticker -->
<div class="ticker-row">
  <div class="goal-ticker" id="goalTicker">
    <div class="goal-ticker-led"><span class="goal-ticker-led-dot"></span></div>
    <div class="goal-ticker-label">GOALS</div>
    <div class="goal-ticker-stage" id="goalTickerStage"></div>
    <div class="goal-ticker-meta" id="goalTickerMeta">0/0</div>
  </div>
</div>

<!-- Pomodoro Mini -->
<div class="pomo-card" id="pomoCard">
  <div style="font-size:32px;">🍅</div>
  <div style="flex:1">
    <div style="font-size:12px; font-weight:700; color:var(--text-tertiary);">ПОМИДОРКИ</div>
    <div style="display:flex; align-items:baseline; gap:6px;">
      <span id="pomoNum" style="font-size:28px; font-weight:800;">0</span>
      <span id="pomoReward" style="font-size:11px; color:var(--text-tertiary);">(всего +0 XP)</span>
    </div>
    <div style="display:flex; gap:4px; margin-top:6px;">
      <button class="pomo-time-btn active" data-min="25">25м</button>
      <button class="pomo-time-btn" data-min="40">40м</button>
      <button class="pomo-time-btn" data-min="60">60м</button>
      <button class="pomo-time-btn" id="pomoCustomBtn">✏️</button>
    </div>
  </div>
  <div style="display:flex; gap:6px;">
    <button id="pomoMinus" class="pomo-btn" style="background:rgba(255,107,107,0.1); color:var(--danger); border:1px solid rgba(255,107,107,0.15)">−</button>
    <button id="pomoPlus" class="pomo-btn" style="background:rgba(107,227,164,0.15); color:var(--success); border:1px solid rgba(107,227,164,0.2)">+</button>
  </div>
</div>

<div class="main-grid">
  <div class="main-left">
    <!-- Today -->
    <div class="section">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px">
        <h2 id="todayLabel" style="font-size:15px; font-weight:700">Сегодня</h2>
        <button id="gmPushBtn" style="padding:6px 12px; border-radius:8px; border:1px solid rgba(107,227,164,0.2); background:rgba(107,227,164,0.06); color:var(--success); font-size:11px; font-weight:700; cursor:pointer;">Перенести на завтра</button>
      </div>
      <div class="gm-card" id="todayCard">
        <div style="display:flex; align-items:baseline; gap:6px; margin-bottom:14px">
          <span class="gm-progress-num" id="gmProgressNum">0</span>
          <span style="font-size:18px; color:var(--text-tertiary)" id="gmProgressTotal">/ 0</span>
          <span style="font-size:11px; font-weight:600; text-transform:uppercase; color:var(--text-tertiary); margin-left:8px" id="gmProgressLabel">выполнено</span>
        </div>
        <ul class="goal-list" id="goalList"></ul>
        <div id="emptyState" style="text-align:center; padding:20px; color:var(--text-tertiary); font-size:12px; display:none">Нет задач на сегодня</div>
        
        <div style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.06); padding-top:16px">
          <input type="text" id="goalInput" class="add-input" placeholder="Добавить задачу (Enter)..." style="width:100%; padding:12px; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff; outline:none">
          <div style="display:flex; gap:8px; margin-top:8px">
            <select id="goalSphere" style="flex:1; padding:8px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff;"></select>
            <select id="goalDiff" style="width:100px; padding:8px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff;">
              <option value="easy">Easy</option>
              <option value="medium" selected>Med</option>
              <option value="hard">Hard</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-right">
    <!-- Radar -->
    <div class="gm-card">
      <div style="font-size:12px; font-weight:700; color:var(--text-tertiary); margin-bottom:12px; text-transform:uppercase;">Баланс сфер</div>
      <div id="radarContainer" style="width:100%; height:260px;"></div>
    </div>
    <!-- Tomorrow -->
    <div class="section">
      <h2 id="tomorrowLabel" style="font-size:13px; font-weight:700; color:var(--text-tertiary); margin-bottom:10px">Завтра</h2>
      <div class="gm-card" style="padding:16px">
        <ul class="goal-list" id="tomorrowList"></ul>
        <div id="tomorrowEmpty" style="text-align:center; padding:10px; color:var(--text-tertiary); font-size:11px; display:none">Пусто</div>
        <input type="text" id="tomorrowInput" placeholder="+ задача на завтра" style="width:100%; margin-top:10px; background:none; border:none; border-bottom:1px solid rgba(255,255,255,0.1); color:#fff; font-size:13px; padding:4px 0; outline:none">
      </div>
    </div>
  </div>
</div>

<!-- Task Details Modal -->
<div class="task-details-modal" id="taskDetailsModal">
  <div class="tdm-box">
    <h3 id="tdmTitle" style="font-size:18px; margin-bottom:12px;"></h3>
    <label style="font-size:10px; font-weight:800; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:6px; display:block;">Описание</label>
    <textarea id="tdmDesc" class="tdm-textarea" placeholder="Детали задачи..."></textarea>
    
    <label style="font-size:10px; font-weight:800; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:8px; display:block;">Подзадачи</label>
    <div id="tdmSubtasks" style="margin-bottom:16px;"></div>
    <button id="tdmAddSub" style="width:100%; padding:8px; border-radius:10px; border:1.5px dashed rgba(255,255,255,0.1); background:none; color:var(--text-tertiary); font-size:12px; cursor:pointer; margin-bottom:20px;">+ Шаг</button>
    
    <button id="tdmClose" class="add-btn-main">Готово</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script>
(function(){
  'use strict';
  var G = window.Gamification;
  var NO_SPHERE_ICON = '⚪', NO_SPHERE_LABEL = 'Без сферы';

  function storeGet(k){ return G.storeGet(k); }
  function storeSet(k, v){ G.storeSet(k, v); }
  function getActiveDateString(){ return new Date().toISOString().slice(0, 10); }
  function getTomorrowDateString(){ var d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0, 10); }
  function formatDate(iso){ var d = new Date(iso); return d.getDate() + ' ' + ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()]; }

  /* --- DATA LOGIC: FIXED TO PREVENT AUTO-DELETE --- */
  // We only carry over UNDONE tasks from the PAST to TODAY, without deleting the past keys.
  function rolloverTasks(){
    var today = getActiveDateString();
    for(var i=0; i<localStorage.length; i++){
        var k = localStorage.key(i);
        if(k && k.indexOf('goals:') === 0){
            var dateStr = k.slice(6);
            if(dateStr < today){
                var oldTasks = storeGet(k) || [];
                var undone = oldTasks.filter(t => !t.done);
                if(undone.length > 0){
                    var current = storeGet('goals:'+today) || [];
                    var existingTexts = current.map(c => c.text);
                    undone.forEach(u => {
                        if(existingTexts.indexOf(u.text) === -1) current.push(u);
                    });
                    storeSet('goals:'+today, current);
                    // Crucial fix: Mark undone tasks in the past as "carried_over" instead of deleting the whole day.
                    oldTasks.forEach(t => { if(!t.done) t.carriedOver = true; });
                    storeSet(k, oldTasks);
                }
            }
        }
    }
  }
  rolloverTasks();

  /* --- TASK DETAILS MODAL LOGIC --- */
  var activeModalTaskId = null;
  var activeModalKey = null;

  function openTaskModal(taskId, key){
    activeModalTaskId = taskId;
    activeModalKey = key;
    var tasks = storeGet(key) || [];
    var t = tasks.find(it => it.id === taskId);
    if(!t) return;

    document.getElementById('tdmTitle').textContent = t.text;
    document.getElementById('tdmDesc').value = t.desc || '';
    renderModalSubtasks(t);
    document.getElementById('taskDetailsModal').classList.add('show');
  }

  function renderModalSubtasks(t){
    var container = document.getElementById('tdmSubtasks');
    container.innerHTML = '';
    (t.subtasks || []).forEach((s, idx) => {
        var div = document.createElement('div');
        div.className = 'subtask-row';
        div.innerHTML = `
            <input type="checkbox" ${s.done?'checked':''} onchange="window.toggleSub(${idx})">
            <input type="text" class="subtask-input" value="${s.text}" onblur="window.editSub(this.value, ${idx})">
            <button onclick="window.delSub(${idx})" style="background:none; border:none; color:var(--danger); cursor:pointer;">×</button>
        `;
        container.appendChild(div);
    });
  }

  window.toggleSub = function(idx){
    var tasks = storeGet(activeModalKey);
    var t = tasks.find(it => it.id === activeModalTaskId);
    if(t) { t.subtasks[idx].done = !t.subtasks[idx].done; storeSet(activeModalKey, tasks); }
  };
  window.editSub = function(val, idx){
    var tasks = storeGet(activeModalKey);
    var t = tasks.find(it => it.id === activeModalTaskId);
    if(t) { t.subtasks[idx].text = val; storeSet(activeModalKey, tasks); }
  };
  window.delSub = function(idx){
    var tasks = storeGet(activeModalKey);
    var t = tasks.find(it => it.id === activeModalTaskId);
    if(t) { t.subtasks.splice(idx, 1); storeSet(activeModalKey, tasks); renderModalSubtasks(t); }
  };
  document.getElementById('tdmAddSub').onclick = function(){
    var tasks = storeGet(activeModalKey);
    var t = tasks.find(it => it.id === activeModalTaskId);
    if(t){
        if(!t.subtasks) t.subtasks = [];
        t.subtasks.push({ text: '', done: false });
        storeSet(activeModalKey, tasks);
        renderModalSubtasks(t);
    }
  };
  document.getElementById('tdmClose').onclick = function(){
    var tasks = storeGet(activeModalKey);
    var t = tasks.find(it => it.id === activeModalTaskId);
    if(t) { t.desc = document.getElementById('tdmDesc').value; storeSet(activeModalKey, tasks); }
    document.getElementById('taskDetailsModal').classList.remove('show');
    loadToday(); loadTomorrow();
  };

  /* --- UI RENDERING --- */
  function buildGoalRow(goal, idx, key, readOnly) {
    if(!goal.id) goal.id = 't_' + Date.now() + Math.random();
    var li = document.createElement('li');
    li.className = 'goal-row' + (goal.done ? ' done' : '');
    
    var subDone = (goal.subtasks || []).filter(s => s.done).length;
    var subTotal = (goal.subtasks || []).length;
    var counterText = subTotal > 0 ? `<span class="subtask-counter">(${subDone}/${subTotal})</span>` : '';

    li.innerHTML = `
        <label class="goal-cb-wrap" onclick="event.stopPropagation()">
            <input type="checkbox" class="goal-cb" ${goal.done?'checked':''} ${readOnly?'disabled':''}>
            <div class="goal-cb-visual"></div>
        </label>
        <span class="goal-text">${goal.text} ${counterText}</span>
        <button class="btn-detail" onclick="event.stopPropagation(); window.openTaskModal('${goal.id}', '${key}')">📝</button>
    `;

    var cb = li.querySelector('.goal-cb');
    cb.onchange = function(){
        var tasks = storeGet(key);
        tasks[idx].done = cb.checked;
        if(tasks[idx].done) G.completeTask(tasks[idx].sphere, tasks[idx].difficulty || 'medium', 15);
        storeSet(key, tasks);
        loadToday();
    };

    return li;
  }

  window.openTaskModal = openTaskModal;

  function loadToday(){
    var k = 'goals:' + getActiveDateString();
    var tasks = storeGet(k) || [];
    var list = document.getElementById('goalList'); list.innerHTML = '';
    tasks.forEach((t, i) => list.appendChild(buildGoalRow(t, i, k, false)));
    document.getElementById('gmProgressNum').textContent = tasks.filter(t => t.done).length;
    document.getElementById('gmProgressTotal').textContent = '/ ' + tasks.length;
    document.getElementById('emptyState').style.display = tasks.length ? 'none' : 'block';
  }

  function loadTomorrow(){
    var k = 'goals:' + getTomorrowDateString();
    var tasks = storeGet(k) || [];
    var list = document.getElementById('tomorrowList'); list.innerHTML = '';
    tasks.forEach((t, i) => list.appendChild(buildGoalRow(t, i, k, true)));
    document.getElementById('tomorrowEmpty').style.display = tasks.length ? 'none' : 'block';
  }

  /* --- INIT --- */
  function populateSpheres(){
    var s = document.getElementById('goalSphere');
    s.innerHTML = '<option value="">Сфера...</option>';
    G.SPHERES.forEach(it => s.innerHTML += `<option value="${it.id}">${it.icon} ${it.name}</option>`);
  }

  document.getElementById('goalInput').onkeydown = function(e){
    if(e.key === 'Enter'){
        var val = this.value.trim(); if(!val) return;
        var k = 'goals:' + getActiveDateString();
        var tasks = storeGet(k) || [];
        tasks.push({ id:'t'+Date.now(), text: val, done: false, sphere: document.getElementById('goalSphere').value, difficulty: document.getElementById('goalDiff').value, subtasks: [], desc: '' });
        storeSet(k, tasks); this.value = ''; loadToday();
    }
  };

  // Radar Chart
  var radar = null;
  function renderRadar(){
    var spheres = G.getSpheres();
    var data = G.SPHERES.map(s => (spheres[s.id] || {xp:0}).xp);
    var labels = G.SPHERES.map(s => s.name);
    var options = {
        series: [{ name: 'XP', data: data }],
        chart: { height: 260, type: 'radar', toolbar: {show:false}, animations: {enabled:false} },
        colors: ['#F2C063'],
        xaxis: { categories: labels, labels: { style: { colors: Array(labels.length).fill('#A0A0A0') } } },
        yaxis: { show: false },
        grid: { borderColor: 'rgba(255,255,255,0.05)' }
    };
    if(radar) radar.destroy();
    radar = new ApexCharts(document.querySelector("#radarContainer"), options);
    radar.render();
  }

  /* --- POMODORO --- */
  var selectedPomoMin = 25;
  function updatePomo(){
    var d = G.storeGet('pomo_v2:'+getActiveDateString()) || {count:0, totalXp:0};
    document.getElementById('pomoNum').textContent = d.count;
    document.getElementById('pomoReward').textContent = '(всего +' + d.totalXp + ' XP)';
  }
  document.querySelectorAll('.pomo-time-btn[data-min]').forEach(b => b.onclick = () => {
    document.querySelectorAll('.pomo-time-btn').forEach(btn => btn.classList.remove('active'));
    b.classList.add('active'); selectedPomoMin = parseInt(b.dataset.min);
  });
  document.getElementById('pomoPlus').onclick = () => {
    var k = 'pomo_v2:'+getActiveDateString();
    var d = storeGet(k) || {count:0, totalXp:0};
    d.count++; d.totalXp += selectedPomoMin;
    storeSet(k, d); G.addXpToSphere('growth', selectedPomoMin); G.earnCoins(Math.round(selectedPomoMin*0.1), 'Помодорка');
    updatePomo();
  };

  populateSpheres(); loadToday(); loadTomorrow(); renderRadar(); updatePomo();
})();
</script>
