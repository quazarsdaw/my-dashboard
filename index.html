<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#1C1E24">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="app-icon.svg">
<title>Диспетчер задач</title>
<script src="gamification.js?v=7"></script>
<script src="supabase-sync.js?v=26-sb" defer></script>
<script src="topbar.js?v=18" defer></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  --text-primary: #FAFAFA; --text-secondary: #D1D1D1; --text-tertiary: #A0A0A0;
  --success: #6BE3A4; --warning: #F2C063; --danger: #FF6B6B;
  --card-bg: rgba(255,255,255,0.09); --card-radius: 16px;
}
html { background: #1C1E24; scrollbar-gutter: stable; }
body { font-family: var(--font-sans); color: var(--text-primary); background: #1C1E24; min-height: 100vh; max-width: 800px; margin: 0 auto; -webkit-font-smoothing: antialiased; }

body::before { content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none; background: radial-gradient(ellipse 50% 50% at 82% 14%, rgba(192,132,252,0.12), transparent), radial-gradient(ellipse 50% 50% at 18% 90%, rgba(125,211,252,0.08), transparent); filter: blur(40px); animation: bgDrift 36s ease-in-out infinite alternate; }
@keyframes bgDrift { 0% { transform: translate(0,0); } 100% { transform: translate(-12px,8px); } }

.page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.025em; background: linear-gradient(180deg, #FFF 0%, #C7C4BC 120%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin: 16px 0 20px; }

/* Dashboard Cards */
.gm-card { background: var(--card-bg); border-radius: var(--card-radius); padding: 20px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.3); }

/* Task Sections */
.task-section { margin-bottom: 12px; }
.task-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: rgba(255,255,255,0.05); border-radius: 14px; cursor: pointer; user-select: none; border: 1px solid rgba(255,255,255,0.05); }
.task-header:hover { background: rgba(255,255,255,0.08); }
.task-header-title { flex: 1; font-size: 13px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-tertiary); }
.task-header-count { font-size: 11px; background: rgba(255,255,255,0.07); padding: 2px 8px; border-radius: 6px; }
.task-header-arrow { font-size: 10px; transition: transform 0.3s; }
.task-section.collapsed .task-header-arrow { transform: rotate(-90deg); }
.task-content { max-height: 2000px; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s; padding-top: 8px; }
.task-section.collapsed .task-content { max-height: 0; opacity: 0; padding: 0; pointer-events: none; }

/* Task Row */
.task-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: rgba(255,255,255,0.035); border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); margin-bottom: 6px; cursor: pointer; transition: transform 0.1s; }
.task-row:hover { transform: translateX(2px); border-color: rgba(255,255,255,0.1); }
.task-cb { width: 22px; height: 22px; border-radius: 7px; border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.task-cb.done { background: var(--success); border-color: var(--success); }
.task-cb.done::after { content: '✓'; color: #1C1E24; font-size: 14px; font-weight: 800; }
.task-text { flex: 1; font-size: 14px; font-weight: 500; }
.task-row.done .task-text { text-decoration: line-through; opacity: 0.5; }
.task-meta { font-size: 10px; color: var(--text-tertiary); }

/* Pomodoro Selection Styles (Previous request preserved) */
.pomo-time-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--text-tertiary); font-size: 10px; font-weight: 700; padding: 4px 8px; cursor: pointer; transition: all 0.15s; }
.pomo-time-btn.active { background: rgba(107,227,164,0.15); color: var(--success); border-color: rgba(107,227,164,0.3); }

/* Add Task Area */
.add-task-box { margin: 24px 0 40px; }
.add-input { width: 100%; padding: 14px 18px; border-radius: 16px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 15px; outline: none; margin-bottom: 12px; }
.add-btn-main { width: 100%; padding: 14px; border-radius: 14px; border: none; background: linear-gradient(180deg, #fff, #e0e0e0); color: #1c1e24; font-weight: 800; cursor: pointer; }

/* Modal for details */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal-box { background: #1C1E24; border-radius: 24px; padding: 24px; max-width: 440px; width: 100%; border: 1px solid rgba(255,255,255,0.14); box-shadow: 0 24px 60px rgba(0,0,0,0.6); }
.modal-input-desc { width: 100%; height: 120px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: #fff; padding: 12px; font-family: inherit; font-size: 14px; outline: none; resize: none; margin-bottom: 20px; }
.subtask-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.subtask-input { flex: 1; background: none; border: none; color: #fff; font-size: 13px; border-bottom: 1px solid transparent; padding-bottom: 2px; }
.subtask-input:focus { border-color: var(--text-tertiary); outline: none; }
</style>
</head>
<body>

<h1 class="page-title">Диспетчер</h1>

<!-- Pomodoro Mini -->
<div class="gm-card" style="display:flex; align-items:center; gap:16px;">
    <div style="font-size:32px;">🍅</div>
    <div style="flex:1">
        <div style="font-size:12px; font-weight:700; color:var(--text-tertiary);">ПОМИДОРКИ</div>
        <div style="display:flex; align-items:baseline; gap:6px;">
            <span id="pomoNum" style="font-size:28px; font-weight:800;">0</span>
            <span id="pomoReward" style="font-size:11px; color:var(--text-tertiary);"></span>
        </div>
        <div style="display:flex; gap:4px; margin-top:6px;">
            <button class="pomo-time-btn active" data-min="25">25м</button>
            <button class="pomo-time-btn" data-min="40">40м</button>
            <button class="pomo-time-btn" data-min="60">60м</button>
            <button class="pomo-time-btn" id="pomoCustomBtn">✏️</button>
        </div>
    </div>
    <div style="display:flex; gap:6px;">
        <button id="pomoMinus" style="width:36px; height:36px; border-radius:10px; border:none; background:rgba(255,107,107,0.1); color:var(--danger); cursor:pointer;">−</button>
        <button id="pomoPlus" style="width:36px; height:36px; border-radius:10px; border:none; background:rgba(107,227,164,0.15); color:var(--success); cursor:pointer;">+</button>
    </div>
</div>

<!-- Task Sections -->
<div id="taskSections">
    <!-- Today -->
    <div class="task-section" id="section-today">
        <div class="task-header" onclick="window.toggleSection('today')">
            <span class="task-header-title">☀️ Сегодня</span>
            <span class="task-header-count" id="count-today">0</span>
            <span class="task-header-arrow">▼</span>
        </div>
        <div class="task-content" id="list-today"></div>
    </div>
    <!-- Tomorrow -->
    <div class="task-section" id="section-tomorrow">
        <div class="task-header" onclick="window.toggleSection('tomorrow')">
            <span class="task-header-title">⛅ Завтра</span>
            <span class="task-header-count" id="count-tomorrow">0</span>
            <span class="task-header-arrow">▼</span>
        </div>
        <div class="task-content" id="list-tomorrow"></div>
    </div>
    <!-- Backlog -->
    <div class="task-section" id="section-backlog">
        <div class="task-header" onclick="window.toggleSection('backlog')">
            <span class="task-header-title">📦 Бэклог (когда-нибудь)</span>
            <span class="task-header-count" id="count-backlog">0</span>
            <span class="task-header-arrow">▼</span>
        </div>
        <div class="task-content" id="list-backlog"></div>
    </div>
</div>

<!-- Add Area -->
<div class="add-task-box">
    <input type="text" class="add-input" id="taskInput" placeholder="Что нужно сделать?" autocomplete="off">
    <button class="add-btn-main" id="addTaskBtn">Добавить в Сегодня</button>
</div>

<!-- Task Details Modal -->
<div class="modal-overlay" id="taskModal">
    <div class="modal-box">
        <h3 id="mTitle" style="margin-bottom:12px; font-size:18px;"></h3>
        <label style="font-size:11px; font-weight:800; color:var(--text-tertiary); text-transform:uppercase;">Заметки и детали</label>
        <textarea class="modal-input-desc" id="mDesc" placeholder="Напиши подробности..."></textarea>
        
        <label style="font-size:11px; font-weight:800; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:8px; display:block;">Чек-лист (подзадачи)</label>
        <div id="mSubtasks" style="margin-bottom:20px;"></div>
        <button onclick="window.addSubtask()" style="background:none; border:1.5px dashed rgba(255,255,255,0.1); color:var(--text-tertiary); width:100%; padding:8px; border-radius:10px; font-size:12px; cursor:pointer; margin-bottom:24px;">+ Добавить подзадачу</button>
        
        <div style="display:flex; gap:10px;">
            <button class="add-btn-main" id="mSave" style="flex:1">Закрыть и сохранить</button>
            <button class="add-btn-main" id="mDelete" style="background:rgba(255,107,107,0.1); color:var(--danger); width:auto; padding:0 20px;">🗑️</button>
        </div>
    </div>
</div>

<script>
(function(){
  'use strict';
  var G = window.Gamification;

  function dateKey(offset = 0) {
    var d = new Date();
    if(offset) d.setDate(date.getDate() + offset);
    var off = d.getTimezoneOffset() * 60000;
    return new Date(d.getTime() - off).toISOString().slice(0, 10);
  }

  function getTodayKey(){ return dateKey(0); }
  function getTomorrowKey(){ 
    var d = new Date(); d.setDate(d.getDate() + 1); 
    var off = d.getTimezoneOffset() * 60000;
    return new Date(d.getTime() - off).toISOString().slice(0, 10);
  }

  /* --- DATA LOGIC --- */
  function getTasks(key){ return G.storeGet('tasks_v2:' + key) || []; }
  function setTasks(key, data){ G.storeSet('tasks_v2:' + key, data); }
  function getCollapsed(){ return G.storeGet('task_sections_collapsed') || {}; }
  function setCollapsed(c){ G.storeSet('task_sections_collapsed', c); }

  var activeTaskId = null;
  var activeTaskKey = null;

  function renderList(key, elementId, countId){
    var tasks = getTasks(key);
    var list = document.getElementById(elementId);
    list.innerHTML = '';
    document.getElementById(countId).textContent = tasks.length;

    if(tasks.length === 0) {
        list.innerHTML = '<div style="padding:16px; font-size:12px; color:var(--text-tertiary); text-align:center;">Список пуст</div>';
    }

    tasks.forEach(function(t){
        var row = document.createElement('div');
        row.className = 'task-row' + (t.done ? ' done' : '');
        row.innerHTML = `
            <div class="task-cb ${t.done?'done':''}" onclick="window.toggleTask(event, '${t.id}', '${key}')"></div>
            <div class="task-text">${t.text}</div>
            <div class="task-meta">${(t.subtasks||[]).filter(s=>s.done).length}/${(t.subtasks||[]).length}</div>
        `;
        row.onclick = () => openDetails(t, key);
        list.appendChild(row);
    });
  }

  function renderAll(){
    renderList(getTodayKey(), 'list-today', 'count-today');
    renderList(getTomorrowKey(), 'list-tomorrow', 'count-tomorrow');
    renderList('backlog', 'list-backlog', 'count-backlog');
    
    var collapsed = getCollapsed();
    ['today', 'tomorrow', 'backlog'].forEach(id => {
        document.getElementById('section-'+id).classList.toggle('collapsed', !!collapsed[id]);
    });
  }

  window.toggleSection = function(id){
    var c = getCollapsed();
    c[id] = !c[id];
    setCollapsed(c);
    renderAll();
  }

  window.toggleTask = function(e, id, key){
    e.stopPropagation();
    var tasks = getTasks(key);
    var t = tasks.find(it => it.id === id);
    if(t) {
        t.done = !t.done;
        if(t.done) G.completeTask('growth', 'medium', 15);
        setTasks(key, tasks);
        renderAll();
    }
  }

  document.getElementById('addTaskBtn').onclick = function(){
    var val = document.getElementById('taskInput').value.trim();
    if(!val) return;
    var key = getTodayKey();
    var tasks = getTasks(key);
    tasks.push({ id: 't_'+Date.now(), text: val, done: false, desc: '', subtasks: [] });
    setTasks(key, tasks);
    document.getElementById('taskInput').value = '';
    renderAll();
  };

  /* --- MODAL LOGIC --- */
  function openDetails(t, key){
    activeTaskId = t.id;
    activeTaskKey = key;
    document.getElementById('mTitle').textContent = t.text;
    document.getElementById('mDesc').value = t.desc || '';
    renderSubtasks(t);
    document.getElementById('taskModal').classList.add('show');
  }

  function renderSubtasks(t){
    var container = document.getElementById('mSubtasks');
    container.innerHTML = '';
    (t.subtasks || []).forEach((s, idx) => {
        var div = document.createElement('div');
        div.className = 'subtask-row';
        div.innerHTML = `
            <input type="checkbox" ${s.done?'checked':''} onchange="window.toggleSub(${idx})">
            <input type="text" class="subtask-input" value="${s.text}" onblur="window.editSub(this.value, ${idx})">
            <button onclick="window.delSub(${idx})" style="background:none; border:none; color:var(--danger); cursor:pointer;">×</button>
        `;
        container.appendChild(div);
    });
  }

  window.addSubtask = function(){
    var tasks = getTasks(activeTaskKey);
    var t = tasks.find(it => it.id === activeTaskId);
    if(t){
        if(!t.subtasks) t.subtasks = [];
        t.subtasks.push({ text: '', done: false });
        renderSubtasks(t);
    }
  };

  window.toggleSub = function(idx){
    var tasks = getTasks(activeTaskKey);
    var t = tasks.find(it => it.id === activeTaskId);
    if(t) { t.subtasks[idx].done = !t.subtasks[idx].done; setTasks(activeTaskKey, tasks); }
  };

  window.editSub = function(val, idx){
    var tasks = getTasks(activeTaskKey);
    var t = tasks.find(it => it.id === activeTaskId);
    if(t) { t.subtasks[idx].text = val; setTasks(activeTaskKey, tasks); }
  };

  window.delSub = function(idx){
    var tasks = getTasks(activeTaskKey);
    var t = tasks.find(it => it.id === activeTaskId);
    if(t) { t.subtasks.splice(idx, 1); setTasks(activeTaskKey, tasks); renderSubtasks(t); }
  };

  document.getElementById('mSave').onclick = function(){
    var tasks = getTasks(activeTaskKey);
    var t = tasks.find(it => it.id === activeTaskId);
    if(t) { t.desc = document.getElementById('mDesc').value; setTasks(activeTaskKey, tasks); }
    document.getElementById('taskModal').classList.remove('show');
    renderAll();
  };

  document.getElementById('mDelete').onclick = function(){
    if(!confirm('Удалить задачу?')) return;
    var tasks = getTasks(activeTaskKey);
    setTasks(activeTaskKey, tasks.filter(it => it.id !== activeTaskId));
    document.getElementById('taskModal').classList.remove('show');
    renderAll();
  };

  /* --- POMODORO LOGIC (Preserved) --- */
  var selectedPomoMin = 25;
  function updatePomoUI(){
    var today = getTodayKey();
    var data = G.storeGet('pomo_v2:'+today) || { count: 0, totalXp: 0 };
    document.getElementById('pomoNum').textContent = data.count;
    document.getElementById('pomoReward').textContent = '(всего +' + data.totalXp + ' XP)';
  }
  document.querySelectorAll('.pomo-time-btn[data-min]').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.pomo-time-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedPomoMin = parseInt(btn.dataset.min, 10);
    };
  });
  document.getElementById('pomoCustomBtn').onclick = function(){
    var val = prompt('Минуты?', selectedPomoMin);
    if(val) { selectedPomoMin = parseInt(val, 10); this.textContent = selectedPomoMin+'м'; }
  };
  document.getElementById('pomoPlus').onclick = function(){
    var today = getTodayKey();
    var data = G.storeGet('pomo_v2:'+today) || { count: 0, totalXp: 0 };
    data.count++; data.totalXp += selectedPomoMin;
    G.storeSet('pomo_v2:'+today, data);
    G.addXpToSphere('growth', selectedPomoMin);
    G.earnCoins(Math.round(selectedPomoMin * 0.2), 'Помидорка');
    updatePomoUI();
  };
  updatePomoUI();
  renderAll();
})();
</script>
</body>
</html>
