<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#1C1E24">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="app-icon.svg">
<title>Здоровье и Спорт</title>
<script src="gamification.js?v=7"></script>
<script src="supabase-sync.js?v=26-sb" defer></script>
<script src="topbar.js?v=15" defer></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --text-primary:#FAFAFA;--text-secondary:#D1D1D1;--text-tertiary:#A0A0A0;
  --success:#6BE3A4;--warning:#F2C063;--danger:#FF6B6B;
  --card-bg:rgba(255,255,255,0.09);--card-radius:16px;
}
html{background:#1C1E24; scrollbar-gutter: stable;}
body{font-family:var(--font-sans);color:var(--text-primary);background:#1C1E24;
  min-height:100vh;margin:0;-webkit-font-smoothing:antialiased}

/* Grid Layout */
.combined-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  padding: 0 20px;
  align-items: start;
}

@media (max-width: 900px) {
  .combined-container { gap: 20px; padding: 0 16px; }
}

@media (max-width: 768px) {
  .combined-container { grid-template-columns: 1fr; }
}

body::before{content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:radial-gradient(ellipse 50% 50% at 82% 14%,rgba(224,118,88,0.22),transparent),
  radial-gradient(ellipse 50% 50% at 18% 90%,rgba(180,180,200,0.06),transparent);
  filter:blur(40px);animation:bgDrift 36s ease-in-out infinite alternate}
@keyframes bgDrift{0%{transform:translate(0,0)}100%{transform:translate(-12px,8px)}}
body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg width='3' height='3' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='white' fill-opacity='0.014'/%3E%3C/svg%3E");background-repeat:repeat}

.page-title{font-size:28px;font-weight:700;letter-spacing:-0.025em;
  background:linear-gradient(180deg,#FFF 0%,#C7C4BC 120%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:16px 0 14px}
.section{margin-bottom:24px}
.section-title{font-size:10.5px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--text-tertiary);display:flex;align-items:center;gap:12px;margin-bottom:14px}
.section-title::before{content:'';width:18px;height:1px;background:var(--text-tertiary);opacity:0.6}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.08),transparent)}

.card{background:var(--card-bg);border-radius:var(--card-radius);padding:18px;
  backdrop-filter:blur(24px) saturate(1.2);box-shadow:0 12px 40px rgba(0,0,0,0.45)}

/* --- Shared / Common styles from health & gym --- */
.add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap; border-top:1px solid rgba(255,255,255,0.06);padding-top:14px;margin-top:14px}
.add-input{flex:1;min-width:120px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.08);color:var(--text-primary);font-size:14px;font-family:var(--font-sans);outline:none}
.add-btn{padding:10px 20px;border-radius:12px;border:none;cursor:pointer; background:linear-gradient(180deg,#FFF 0%,#E8E5DD 100%);color:#1C1E24; font-size:13px;font-weight:700;font-family:var(--font-sans); box-shadow:inset 0 1px 0 rgba(255,255,255,0.8),0 2px 8px rgba(0,0,0,0.3); transition:transform 0.1s;white-space:nowrap}
.empty{font-size:12px;color:var(--text-tertiary);font-style:italic;padding:14px 0;text-align:center}

/* --- Health Styles --- */
.stack-progress{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
.stack-num{font-size:36px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.04em}
.stack-bar{display:flex;gap:3px;height:5px;margin-bottom:16px;border-radius:3px;overflow:hidden}
.stack-bar-seg{flex:1;background:rgba(255,255,255,0.08);border-radius:3px;transition:background 0.3s}
.stack-bar-seg.taken{background:#6BE3A4;box-shadow:0 0 6px rgba(107,227,164,0.4)}
.stack-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px; background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.06);transition:background 0.15s; margin-bottom:6px}
.stack-cb-wrap{position:relative;width:22px;height:22px;flex-shrink:0}
.stack-cb{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;z-index:1}
.stack-cb-vis{width:22px;height:22px;border-radius:7px;border:1.5px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;transition:background 0.2s,border-color 0.2s}
.stack-cb:checked+.stack-cb-vis{background:#6BE3A4;border-color:#6BE3A4}
.water-count{display:flex;align-items:baseline;gap:6px}
.water-num{font-size:48px;font-weight:800;color:#7DD3FC}
.water-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:6px;margin-bottom:16px}
.water-drop{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center; font-size:20px;background:rgba(125,211,252,0.06);border:1px solid rgba(125,211,252,0.1); cursor:pointer}
.water-drop.filled{background:rgba(125,211,252,0.2);border-color:rgba(125,211,252,0.3)}
.wt-num{font-size:42px;font-weight:800}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center; font-size:12px;font-weight:600;font-family:var(--font-mono);cursor:pointer; border:1px solid transparent}
.cal-day.deficit{background:rgba(107,227,164,0.15);color:#6BE3A4}
.cal-day.surplus{background:rgba(255,107,107,0.15);color:#FF9B9B}
.habit-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px; background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.06);margin-bottom:8px}
.habit-bar-bg{height:4px;border-radius:2px;background:rgba(255,255,255,0.06);margin-top:6px;overflow:hidden}
.habit-bar-fill{height:100%;border-radius:2px;transition:width 0.4s ease}

/* --- Sport Styles --- */
.workout-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.ws-stat{flex:1;min-width:90px;text-align:center;padding:12px;border-radius:14px; background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)}
.ws-stat-num{font-size:24px;font-weight:800}
.workout-day-header{display:flex;align-items:center;justify-content:space-between; padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.035); border:1px solid rgba(255,255,255,0.06);cursor:pointer; margin-bottom:6px}
.workout-day-header.done{background:rgba(107,227,164,0.04);border-color:rgba(107,227,164,0.1)}
.exercise-list{display:none;padding:8px 0 12px;list-style:none}
.exercise-list.open{display:block}
.exercise-item{display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:4px; border-radius:10px;background:rgba(255,255,255,0.025)}
.ex-input{width:60px;padding:6px 8px;border-radius:8px;background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.08);color:var(--text-primary);font-size:12px;text-align:center;outline:none}
.complete-workout-btn{width:100%;padding:14px;margin-top:10px;border:none;border-radius:14px;cursor:pointer; background:linear-gradient(180deg,rgba(107,227,164,0.2),rgba(107,227,164,0.08)); color:var(--success);font-size:14px;font-weight:700}
.history-item{display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:4px; border-radius:10px;background:rgba(255,255,255,0.025)}

@media(max-width:480px){
  .page-title{font-size:22px}
  .add-row{flex-direction:column}
  .add-input{width:100%}
}
</style>
</head>
<body>

<div class="combined-container">
  <!-- LEFT COLUMN: HEALTH -->
  <div class="health-column">
    <h1 class="page-title">Здоровье</h1>
    
    <!-- Stack -->
    <div class="section">
      <div class="section-title">Ежедневный стек</div>
      <div class="card">
        <div class="stack-progress">
          <span class="stack-num" id="stackDone">0</span>
          <span class="stack-total" id="stackTotal">/ 0</span>
          <span class="stack-label" id="stackLabel" style="margin-left:8px">принято</span>
        </div>
        <div class="stack-bar" id="stackBar"></div>
        <ul class="stack-list" id="stackList" style="list-style:none"></ul>
        <div class="empty" id="stackEmpty">Добавь свои добавки и витамины.</div>
        <div class="add-row">
          <input class="add-input" id="stackNameInput" type="text" placeholder="Название..." autocomplete="off">
          <select class="add-input" id="stackTimeSelect" style="flex:0 0 100px; min-width:auto">
            <option value="morning">Утро</option>
            <option value="afternoon">День</option>
            <option value="evening">Вечер</option>
          </select>
          <button class="add-btn" id="stackAddBtn">+</button>
        </div>
      </div>
    </div>

    <!-- Water -->
    <div class="section" id="water">
      <div class="section-title">Вода</div>
      <div class="card">
        <div class="water-count" style="margin-bottom:16px">
          <span class="water-num" id="waterDone">0</span>
          <span class="water-total" style="font-size:20px; color:var(--text-tertiary)">/ 0</span>
        </div>
        <div class="water-grid" id="waterGrid"></div>
        <button class="add-btn" id="waterAddBtn" style="width:100%; padding:14px">+ Выпить</button>
      </div>
    </div>

    <!-- Weight -->
    <div class="section">
      <div class="section-title">Вес</div>
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px">
          <span class="wt-num" id="wtCurrent">—</span>
          <span id="wtGoalBadge" style="font-size:12px; color:var(--success)">Цель: —</span>
        </div>
        <div class="add-row" style="border:none; padding:0; margin:0">
          <input class="add-input" id="wtInput" type="number" step="0.1" placeholder="кг">
          <button class="add-btn" id="wtLogBtn">Ок</button>
        </div>
      </div>
    </div>

    <!-- Habits -->
    <div class="section">
      <div class="section-title">Привычки</div>
      <div class="card">
        <div class="habit-row">
          <div style="flex:1">
            <div style="font-size:14px; font-weight:600">Сон</div>
            <div class="habit-bar-bg"><div class="habit-bar-fill" id="sleepBar" style="background:#C084FC"></div></div>
          </div>
          <input class="add-input" id="sleepInput" type="number" step="0.5" style="flex:0 0 60px; min-width:auto; text-align:center" placeholder="ч">
        </div>
        <div class="habit-row">
          <div style="flex:1">
            <div style="font-size:14px; font-weight:600">Шаги</div>
            <div class="habit-bar-bg"><div class="habit-bar-fill" id="stepsBar" style="background:#F2C063"></div></div>
          </div>
          <input class="add-input" id="stepsInput" type="number" style="flex:0 0 80px; min-width:auto; text-align:center" placeholder="шагов">
        </div>
        <button class="add-btn" id="habitsLogBtn" style="width:100%; margin-top:8px">Записать</button>
      </div>
    </div>
  </div>

  <!-- RIGHT COLUMN: SPORT -->
  <div class="sport-column">
    <h1 class="page-title">Спорт</h1>

    <!-- Gym Stats -->
    <div class="workout-stats" id="workoutStats">
      <div class="ws-stat"><div class="ws-stat-num" id="statWorkouts" style="color:var(--success)">0</div><div style="font-size:9px; color:var(--text-tertiary)">Всего</div></div>
      <div class="ws-stat"><div class="ws-stat-num" id="statStreak" style="color:var(--warning)">0</div><div style="font-size:9px; color:var(--text-tertiary)">Стрик</div></div>
      <div class="ws-stat"><div class="ws-stat-num" id="statThisWeek" style="color:#7DD3FC">0</div><div style="font-size:9px; color:var(--text-tertiary)">Неделя</div></div>
    </div>

    <!-- Program -->
    <div class="section">
      <div class="section-title">Программа</div>
      <div class="card">
        <div id="programList"></div>
        <div class="empty" id="programEmpty">Нет программ.</div>
        <div class="add-row">
          <input class="add-input" id="dayNameInput" type="text" placeholder="Название дня...">
          <button class="add-btn" id="dayAddBtn">+</button>
        </div>
      </div>
    </div>

    <!-- History -->
    <div class="section">
      <div class="section-title">История</div>
      <div class="card">
        <div id="historyList"></div>
        <div class="empty" id="historyEmpty">Пусто.</div>
      </div>
    </div>
  </div>
</div>

<script>
/* --- Combined Logic --- */
(function(){
  'use strict';
  var G = window.Gamification;
  function dateKey(){
    var d = new Date();
    var offset = d.getTimezoneOffset() * 60000;
    return new Date(d.getTime() - offset).toISOString().slice(0, 10);
  }

  /* --- HEALTH LOGIC --- */
  var TIME_LABELS = { morning: 'Утро', afternoon: 'День', evening: 'Вечер' };
  function getStack(){ return G.storeGet('stack:items') || []; }
  function getTaken(){ return G.storeGet('stack:taken:' + dateKey()) || {}; }
  function renderStack(){
    var items = getStack(), taken = getTaken(), list = document.getElementById('stackList'), bar = document.getElementById('stackBar');
    list.innerHTML = ''; bar.innerHTML = ''; var done = 0;
    document.getElementById('stackEmpty').style.display = items.length ? 'none' : 'block';
    items.forEach(function(it, i){
      var isT = !!taken[it.id]; if(isT) done++;
      var s = document.createElement('div'); s.className = 'stack-bar-seg'+(isT?' taken':''); bar.appendChild(s);
      var li = document.createElement('li'); li.className = 'stack-item'+(isT?' taken':'');
      li.innerHTML = '<label class="stack-cb-wrap"><input type="checkbox" class="stack-cb"'+(isT?' checked':'')+' data-id="'+it.id+'"><div class="stack-cb-vis"></div></label><div style="flex:1"><div class="stack-item-name">'+it.name+'</div></div><span style="font-size:10px; color:var(--text-tertiary)">'+(TIME_LABELS[it.time]||it.time)+'</span><button class="stack-del" style="margin-left:8px" data-idx="'+i+'">×</button>';
      list.appendChild(li);
    });
    document.getElementById('stackDone').textContent = done;
    document.getElementById('stackTotal').textContent = '/ ' + items.length;
    list.querySelectorAll('.stack-cb').forEach(function(cb){ cb.onclick = function(){ var t = getTaken(); if(cb.checked) t[cb.dataset.id]=Date.now(); else delete t[cb.dataset.id]; G.storeSet('stack:taken:'+dateKey(), t); renderStack(); }; });
    list.querySelectorAll('.stack-del').forEach(function(btn){ btn.onclick = function(){ var its = getStack(); its.splice(btn.dataset.idx, 1); G.storeSet('stack:items', its); renderStack(); }; });
  }
  document.getElementById('stackAddBtn').onclick = function(){
    var n = document.getElementById('stackNameInput').value; if(!n) return;
    var its = getStack(); its.push({id:'s'+Date.now(), name:n, time:document.getElementById('stackTimeSelect').value});
    G.storeSet('stack:items', its); document.getElementById('stackNameInput').value=''; renderStack();
  };

  function renderWater(){
    var s = G.storeGet('po_water_v1') || {logs:{}}; var done = (s.logs||{})[dateKey()]||0;
    document.getElementById('waterDone').textContent = done; document.getElementById('waterTotal').textContent = '/ 8';
    var grid = document.getElementById('waterGrid'); grid.innerHTML = '';
    for(var i=0; i<8; i++){ var d = document.createElement('div'); d.className = 'water-drop'+(i<done?' filled':''); d.textContent = i<done?'💧':'·'; grid.appendChild(d); }
  }
  document.getElementById('waterAddBtn').onclick = function(){
    var s = G.storeGet('po_water_v1') || {logs:{}}; s.logs = s.logs || {}; s.logs[dateKey()] = (s.logs[dateKey()]||0)+1;
    G.storeSet('po_water_v1', s); renderWater();
  };

  function renderWeight(){
    var d = G.storeGet('weight_v1') || {entries:[]}; var last = d.entries.length ? d.entries[d.entries.length-1].kg : '—';
    document.getElementById('wtCurrent').textContent = last;
  }
  document.getElementById('wtLogBtn').onclick = function(){
    var v = parseFloat(document.getElementById('wtInput').value); if(!v) return;
    var d = G.storeGet('weight_v1') || {entries:[]}; d.entries.push({date:dateKey(), kg:v});
    G.storeSet('weight_v1', d); renderWeight();
  };

  function renderHabits(){
    var d = G.storeGet('habits_v1') || {sleepGoal:8, stepsGoal:10000, entries:{}}; var e = d.entries[dateKey()] || {};
    document.getElementById('sleepBar').style.width = Math.min(100, ((e.sleep||0)/d.sleepGoal)*100)+'%';
    document.getElementById('stepsBar').style.width = Math.min(100, ((e.steps||0)/d.stepsGoal)*100)+'%';
  }
  document.getElementById('habitsLogBtn').onclick = function(){
    var d = G.storeGet('habits_v1') || {entries:{}}; var today = dateKey(); d.entries[today] = d.entries[today] || {};
    var s = parseFloat(document.getElementById('sleepInput').value), st = parseInt(document.getElementById('stepsInput').value);
    if(s) d.entries[today].sleep = s; if(st) d.entries[today].steps = st;
    G.storeSet('habits_v1', d); renderHabits();
  };

  /* --- SPORT LOGIC --- */
  function getProgram(){ return G.storeGet('gym_program_v1') || []; }
  function getHistory(){ return G.storeGet('gym_history_v1') || []; }
  function renderGym(){
    var prog = getProgram(), hist = getHistory(), container = document.getElementById('programList');
    document.getElementById('statWorkouts').textContent = hist.length;
    document.getElementById('programEmpty').style.display = prog.length ? 'none' : 'block';
    container.innerHTML = '';
    prog.forEach(function(day, di){
      var h = document.createElement('div'); h.className = 'workout-day-header';
      h.innerHTML = '<div class="wdh-left"><span class="wdh-icon">💪</span><div class="wdh-name">'+day.name+'</div></div>';
      var exList = document.createElement('div'); exList.className = 'exercise-list';
      (day.exercises||[]).forEach(function(ex){ var li = document.createElement('div'); li.className='exercise-item'; li.innerHTML='<span class="ex-name">'+ex.name+'</span><span class="ex-sets">'+ex.sets+'×'+ex.reps+'</span>'; exList.appendChild(li); });
      var btn = document.createElement('button'); btn.className='complete-workout-btn'; btn.textContent='Завершить';
      btn.onclick = function(){ hist.unshift({dayName:day.name, date:new Date().toISOString()}); G.storeSet('gym_history_v1', hist); G.completeTask('health', 'hard'); renderGym(); };
      exList.appendChild(btn); h.onclick = function(){ exList.classList.toggle('open'); };
      container.appendChild(h); container.appendChild(exList);
    });
    var hList = document.getElementById('historyList'); hList.innerHTML = '';
    hist.slice(0,5).forEach(function(h){ var it = document.createElement('div'); it.className='history-item'; it.innerHTML='<span class="hi-date">'+h.date.slice(5,10)+'</span><span class="hi-name">'+h.dayName+'</span>'; hList.appendChild(it); });
  }
  document.getElementById('dayAddBtn').onclick = function(){
    var n = document.getElementById('dayNameInput').value; if(!n) return;
    var p = getProgram(); p.push({id:'d'+Date.now(), name:n, exercises:[]});
    G.storeSet('gym_program_v1', p); document.getElementById('dayNameInput').value=''; renderGym();
  };

  function renderAll(){ renderStack(); renderWater(); renderWeight(); renderHabits(); renderGym(); }
  renderAll(); window.addEventListener('gamification-update', renderAll);
})();
</script>
</body>
</html>
