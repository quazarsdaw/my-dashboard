<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#1C1E24">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="app-icon.svg">
<title>Цели на год</title>
<script src="gamification.js?v=7"></script>
<script src="supabase-sync.js?v=26-sb" defer></script>
<script src="topbar.js?v=17" defer></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --text-primary:#FAFAFA;--text-secondary:#D1D1D1;--text-tertiary:#A0A0A0;
  --success:#6BE3A4;--warning:#F2C063;--danger:#FF6B6B;
  --card-bg:rgba(255,255,255,0.09);--card-radius:16px;
}
html{background:#1C1E24}
body{font-family:var(--font-sans);color:var(--text-primary);background:#1C1E24;
  min-height:100vh;max-width:800px;margin:0 auto;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:radial-gradient(ellipse 50% 50% at 82% 14%,rgba(224,118,88,0.22),transparent),
  radial-gradient(ellipse 50% 50% at 18% 90%,rgba(180,180,200,0.06),transparent);
  filter:blur(40px);animation:bgDrift 36s ease-in-out infinite alternate}
@keyframes bgDrift{0%{transform:translate(0,0)}100%{transform:translate(-12px,8px)}}
body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg width='3' height='3' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='white' fill-opacity='0.014'/%3E%3C/svg%3E");background-repeat:repeat}

.page-title{font-size:28px;font-weight:700;letter-spacing:-0.025em;
  background:linear-gradient(180deg,#FFF 0%,#C7C4BC 120%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:16px 0 4px}
.page-sub{font-size:12px;color:var(--text-tertiary);margin-bottom:18px}

/* Year summary */
.year-summary{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:16px 20px;
  background:var(--card-bg);border-radius:var(--card-radius);border:1px solid rgba(255,255,255,0.07)}
.year-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.year-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.year-ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:6}
.year-ring-fg{fill:none;stroke:var(--success);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.6s}
.year-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.year-ring-pct{font-size:20px;font-weight:800;font-family:var(--font-mono)}
.year-ring-label{font-size:8px;font-weight:700;color:var(--text-tertiary);letter-spacing:0.1em;text-transform:uppercase}
.year-info{flex:1}
.year-info-title{font-size:16px;font-weight:700;margin-bottom:4px}
.year-info-stats{font-size:12px;color:var(--text-tertiary);font-family:var(--font-mono)}
.year-time{font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono);margin-top:4px}

/* Goal card */
.goal-card{background:var(--card-bg);border-radius:var(--card-radius);
  border:1px solid rgba(255,255,255,0.07);padding:16px 18px;margin-bottom:10px;
  transition:border-color 0.15s;cursor:pointer}
.goal-card:hover{border-color:rgba(255,255,255,0.1)}
.goal-card.completed{border-color:rgba(107,227,164,0.15);background:rgba(107,227,164,0.03)}
.goal-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.goal-icon{font-size:24px;line-height:1}
.goal-title{flex:1;font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.goal-card.completed .goal-title{text-decoration:line-through;opacity:0.5}
.goal-pct{font-size:14px;font-weight:800;font-family:var(--font-mono);color:var(--success)}
.goal-pct.low{color:var(--danger)}
.goal-pct.mid{color:var(--warning)}
.goal-bar-bg{width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden;margin-bottom:8px}
.goal-bar-fill{height:100%;border-radius:3px;transition:width 0.4s;background:var(--success)}
.goal-bar-fill.low{background:var(--danger)}
.goal-bar-fill.mid{background:var(--warning)}
.goal-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono)}
.goal-sphere-tag{padding:2px 8px;border-radius:6px;background:rgba(255,255,255,0.07);font-size:10px;font-weight:700}
.goal-value{margin-left:auto}
.goal-delete{background:none;border:none;color:var(--text-tertiary);font-size:14px;cursor:pointer;
  opacity:0;transition:opacity 0.15s;padding:0 4px}
.goal-card:hover .goal-delete{opacity:1}
.goal-delete:hover{color:var(--danger)}

/* Add goal */
.add-card{background:var(--card-bg);border-radius:var(--card-radius);
  border:1px solid rgba(255,255,255,0.07);padding:18px;margin-bottom:24px}
.add-card h3{font-size:14px;font-weight:700;margin-bottom:14px}
.add-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.add-input{flex:1;min-width:120px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.08);color:var(--text-primary);font-size:14px;font-family:var(--font-sans);outline:none}
.add-input:focus{border-color:rgba(255,255,255,0.2)}
.add-input::placeholder{color:var(--text-tertiary)}
.add-input-sm{width:80px;min-width:80px;flex:0;text-align:center;font-family:var(--font-mono)}
.add-select{padding:10px 8px;border-radius:10px;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.08);color:var(--text-primary);font-size:13px;cursor:pointer;outline:none;-webkit-appearance:none}
.add-btn{padding:10px 20px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(180deg,#FFF 0%,#E8E5DD 100%);color:#1C1E24;
  font-size:13px;font-weight:700;font-family:var(--font-sans);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.8),0 2px 8px rgba(0,0,0,0.3);transition:transform 0.1s;white-space:nowrap}
.add-btn:hover{transform:translateY(-1px)}
.emoji-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.emoji-btn{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.03);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.emoji-btn.selected{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2)}

/* Edit modal */
.edit-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);align-items:center;justify-content:center}
.edit-overlay.show{display:flex}
.edit-box{background:#1a1a1d;border-radius:16px;padding:20px;max-width:360px;width:90%;border:1px solid rgba(255,255,255,0.08)}
.edit-box h3{font-size:14px;font-weight:700;margin-bottom:14px}
.edit-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.edit-actions{display:flex;gap:8px;margin-top:14px}
.edit-save{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(180deg,#FFF,#E8E5DD);color:#1C1E24;font-size:13px;font-weight:700}
.edit-cancel{padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--text-secondary);font-size:13px;font-weight:700;cursor:pointer}

.section-title{font-size:10.5px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--text-tertiary);display:flex;align-items:center;gap:12px;margin:20px 0 10px}
.section-title::before{content:'';width:18px;height:1px;background:var(--text-tertiary);opacity:0.6}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.08),transparent)}

@media(max-width:480px){
  .page-title{font-size:22px}
  .add-row{flex-direction:column}
  .add-input{width:100%}
  .add-input-sm{width:100%}
}
</style>
</head>
<body>

<h1 class="page-title">Цели 2026</h1>
<div class="page-sub">Отслеживай прогресс к годовым целям</div>

<!-- Year summary -->
<div class="year-summary">
  <div class="year-ring">
    <svg viewBox="0 0 80 80">
      <circle class="year-ring-bg" cx="40" cy="40" r="34"/>
      <circle class="year-ring-fg" id="yearRingFg" cx="40" cy="40" r="34"/>
    </svg>
    <div class="year-ring-center">
      <div class="year-ring-pct" id="yearPct">0%</div>
      <div class="year-ring-label">Общий</div>
    </div>
  </div>
  <div class="year-info">
    <div class="year-info-title" id="yearTitle">0 из 0 целей</div>
    <div class="year-info-stats" id="yearStats">—</div>
    <div class="year-time" id="yearTime">—</div>
  </div>
</div>

<!-- Goals list -->
<div class="section-title">Активные цели</div>
<div id="goalsList"></div>

<div class="section-title" id="completedTitle" style="display:none">Выполненные</div>
<div id="completedList"></div>

<!-- Add goal -->
<div class="add-card">
  <h3>Новая цель</h3>
  <div class="emoji-row" id="emojiRow"></div>
  <div class="add-row">
    <input class="add-input" id="addTitle" type="text" placeholder="Цель…" autocomplete="off">
  </div>
  <div class="add-row">
    <select class="add-select" id="addType">
      <option value="number">Числовая (цель/факт)</option>
      <option value="percent">Процентная (0-100%)</option>
      <option value="check">Чекбокс (да/нет)</option>
    </select>
    <input class="add-input add-input-sm" id="addTarget" type="number" placeholder="Цель" min="1">
    <input class="add-input add-input-sm" id="addUnit" type="text" placeholder="ед." style="width:60px;min-width:60px">
  </div>
  <div class="add-row">
    <select class="add-select" id="addSphere"></select>
    <button class="add-btn" id="addBtn">+ Добавить</button>
  </div>
</div>

<!-- Edit modal -->
<div class="edit-overlay" id="editOverlay">
  <div class="edit-box">
    <h3 id="editTitle">Обновить прогресс</h3>
    <div class="edit-row">
      <input class="add-input" id="editValue" type="number" placeholder="Текущее значение" style="flex:1">
      <span id="editUnit" style="color:var(--text-tertiary);font-size:13px"></span>
    </div>
    <div class="edit-row" id="editTargetRow">
      <span style="font-size:12px;color:var(--text-tertiary);white-space:nowrap">Цель:</span>
      <input class="add-input add-input-sm" id="editTarget" type="number" placeholder="Цель">
    </div>
    <div class="edit-actions">
      <button class="edit-save" id="editSave">Сохранить</button>
      <button class="edit-cancel" id="editCancel">Отмена</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  var G = window.Gamification;
  var GOAL_EMOJIS = ['💰','🏋️','📚','🌍','💻','🏠','🚗','❤️','🎓','🧠','🗣️','📈','🏃','✈️','🎯','💎','🔥','⭐','🎨','🧘'];
  var selectedEmoji = '🎯';
  var editingGoalId = null;

  // --- Data ---
  function getData(){
    var d = G.storeGet('yearly_goals_v1');
    if(!d) d = { year: new Date().getFullYear(), goals: [] };
    return d;
  }
  function setData(d){ G.storeSet('yearly_goals_v1', d); }

  function calcPct(goal){
    if(goal.type === 'check') return goal.done ? 100 : 0;
    if(goal.type === 'percent') return Math.min(100, Math.max(0, goal.current || 0));
    if(goal.type === 'number' && goal.target > 0) return Math.min(100, Math.round((goal.current || 0) / goal.target * 100));
    return 0;
  }
  function pctClass(p){ return p >= 75 ? '' : p >= 40 ? 'mid' : 'low'; }

  // --- Emoji picker ---
  var emojiRow = document.getElementById('emojiRow');
  GOAL_EMOJIS.forEach(function(e){
    var btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.addEventListener('click', function(){
      emojiRow.querySelectorAll('.emoji-btn').forEach(function(b){ b.classList.remove('selected'); });
      btn.classList.add('selected');
      selectedEmoji = e;
    });
    emojiRow.appendChild(btn);
  });

  // --- Sphere select ---
  var addSphere = document.getElementById('addSphere');
  addSphere.innerHTML = '<option value="">Без сферы</option>';
  G.SPHERES.forEach(function(s){
    var opt = document.createElement('option');
    opt.value = s.id; opt.textContent = s.icon + ' ' + s.name;
    addSphere.appendChild(opt);
  });

  // --- Type toggle ---
  var addType = document.getElementById('addType');
  var addTarget = document.getElementById('addTarget');
  var addUnit = document.getElementById('addUnit');
  addType.addEventListener('change', function(){
    var isNum = addType.value === 'number';
    addTarget.style.display = isNum ? '' : 'none';
    addUnit.style.display = isNum ? '' : 'none';
  });

  // --- Add ---
  document.getElementById('addBtn').addEventListener('click', function(){
    var title = document.getElementById('addTitle').value.trim();
    if(!title) return;
    var data = getData();
    var goal = {
      id: 'yg_' + Date.now(),
      title: title,
      icon: selectedEmoji,
      type: addType.value,
      target: parseInt(addTarget.value, 10) || 100,
      unit: addUnit.value.trim() || '',
      current: 0,
      done: false,
      sphere: addSphere.value || null,
      createdAt: new Date().toISOString()
    };
    data.goals.push(goal);
    setData(data);
    document.getElementById('addTitle').value = '';
    addTarget.value = '';
    renderAll();
  });

  // --- Render ---
  function renderGoalCard(goal, idx){
    var pct = calcPct(goal);
    var cls = pctClass(pct);
    var card = document.createElement('div');
    card.className = 'goal-card' + (goal.done ? ' completed' : '');

    var sphere = null;
    if(goal.sphere) for(var i=0;i<G.SPHERES.length;i++){ if(G.SPHERES[i].id === goal.sphere) sphere = G.SPHERES[i]; }

    var valueText = '';
    if(goal.type === 'number') valueText = (goal.current||0) + ' / ' + goal.target + (goal.unit ? ' ' + goal.unit : '');
    else if(goal.type === 'percent') valueText = (goal.current||0) + '%';
    else valueText = goal.done ? '✓ Выполнено' : 'Не выполнено';

    card.innerHTML =
      '<div class="goal-top">' +
        '<span class="goal-icon">' + goal.icon + '</span>' +
        '<span class="goal-title">' + goal.title + '</span>' +
        '<span class="goal-pct ' + cls + '">' + pct + '%</span>' +
        '<button class="goal-delete" data-idx="' + idx + '" title="Удалить">×</button>' +
      '</div>' +
      '<div class="goal-bar-bg"><div class="goal-bar-fill ' + cls + '" style="width:' + pct + '%"></div></div>' +
      '<div class="goal-meta">' +
        (sphere ? '<span class="goal-sphere-tag" style="color:' + sphere.color + '">' + sphere.icon + ' ' + sphere.name + '</span>' : '') +
        '<span class="goal-value">' + valueText + '</span>' +
      '</div>';

    // Click to edit progress
    card.addEventListener('click', function(e){
      if(e.target.classList.contains('goal-delete')) return;
      openEdit(goal);
    });

    // Delete
    card.querySelector('.goal-delete').addEventListener('click', function(e){
      e.stopPropagation();
      var data = getData();
      data.goals.splice(idx, 1);
      setData(data);
      renderAll();
    });

    return card;
  }

  function renderAll(){
    var data = getData();
    var activeList = document.getElementById('goalsList');
    var completedList = document.getElementById('completedList');
    var completedTitle = document.getElementById('completedTitle');
    activeList.innerHTML = '';
    completedList.innerHTML = '';

    var active = [], completed = [];
    data.goals.forEach(function(g, i){
      if(g.done || calcPct(g) >= 100) completed.push({goal:g, idx:i});
      else active.push({goal:g, idx:i});
    });

    if(active.length === 0) activeList.innerHTML = '<div style="padding:14px;color:var(--text-tertiary);font-size:12px;text-align:center">Добавь первую цель на год</div>';
    active.forEach(function(item){ activeList.appendChild(renderGoalCard(item.goal, item.idx)); });

    completedTitle.style.display = completed.length > 0 ? '' : 'none';
    completed.forEach(function(item){ completedList.appendChild(renderGoalCard(item.goal, item.idx)); });

    // Year summary
    var totalGoals = data.goals.length;
    var completedCount = completed.length;
    var avgPct = totalGoals > 0 ? Math.round(data.goals.reduce(function(s,g){ return s + calcPct(g); }, 0) / totalGoals) : 0;

    document.getElementById('yearPct').textContent = avgPct + '%';
    document.getElementById('yearTitle').textContent = completedCount + ' из ' + totalGoals + ' целей';
    document.getElementById('yearStats').textContent = totalGoals > 0 ? ('Средний прогресс: ' + avgPct + '%') : 'Целей пока нет';

    // Year time progress
    var now = new Date();
    var yearStart = new Date(now.getFullYear(), 0, 1);
    var yearEnd = new Date(now.getFullYear(), 11, 31);
    var yearPct = Math.round((now - yearStart) / (yearEnd - yearStart) * 100);
    var daysLeft = Math.ceil((yearEnd - now) / 86400000);
    document.getElementById('yearTime').textContent = '📅 ' + yearPct + '% года прошло · ' + daysLeft + ' дн. осталось';

    // Ring
    var C = 2 * Math.PI * 34;
    var fg = document.getElementById('yearRingFg');
    fg.setAttribute('stroke-dasharray', C);
    fg.setAttribute('stroke-dashoffset', C * (1 - avgPct / 100));
  }

  // --- Edit modal ---
  function openEdit(goal){
    editingGoalId = goal.id;
    document.getElementById('editTitle').textContent = goal.title;
    var valInput = document.getElementById('editValue');
    var unitLabel = document.getElementById('editUnit');
    var targetRow = document.getElementById('editTargetRow');

    if(goal.type === 'check'){
      valInput.type = 'number'; valInput.min = '0'; valInput.max = '1';
      valInput.value = goal.done ? '1' : '0';
      valInput.placeholder = '1 = да, 0 = нет';
      unitLabel.textContent = '(1=да)';
      targetRow.style.display = 'none';
    } else if(goal.type === 'percent'){
      valInput.type = 'number'; valInput.min = '0'; valInput.max = '100';
      valInput.value = goal.current || 0;
      valInput.placeholder = '0-100';
      unitLabel.textContent = '%';
      targetRow.style.display = 'none';
    } else {
      valInput.type = 'number'; valInput.min = '0';
      valInput.value = goal.current || 0;
      valInput.placeholder = 'Текущее';
      unitLabel.textContent = goal.unit || '';
      targetRow.style.display = 'flex';
      document.getElementById('editTarget').value = goal.target;
    }

    document.getElementById('editOverlay').classList.add('show');
    valInput.focus();
  }

  document.getElementById('editSave').addEventListener('click', function(){
    var data = getData();
    var goal = null;
    for(var i=0;i<data.goals.length;i++){ if(data.goals[i].id === editingGoalId){ goal = data.goals[i]; break; } }
    if(!goal) return;

    var val = parseInt(document.getElementById('editValue').value, 10) || 0;
    if(goal.type === 'check'){
      goal.done = val >= 1;
      goal.current = goal.done ? 1 : 0;
    } else if(goal.type === 'percent'){
      goal.current = Math.min(100, Math.max(0, val));
      goal.done = goal.current >= 100;
    } else {
      goal.current = val;
      var newTarget = parseInt(document.getElementById('editTarget').value, 10);
      if(newTarget > 0) goal.target = newTarget;
      goal.done = goal.current >= goal.target;
    }
    setData(data);
    document.getElementById('editOverlay').classList.remove('show');
    renderAll();
  });

  document.getElementById('editCancel').addEventListener('click', function(){
    document.getElementById('editOverlay').classList.remove('show');
  });
  document.getElementById('editOverlay').addEventListener('click', function(e){
    if(e.target === this) this.classList.remove('show');
  });

  renderAll();
})();
</script>
</body>
</html>
