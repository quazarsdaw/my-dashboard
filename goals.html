<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#1C1E24">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="app-icon.svg">
<title>Цели и Горизонты</title>
<script src="gamification.js?v=7"></script>
<script src="supabase-sync.js?v=26-sb" defer></script>
<script src="topbar.js?v=20" defer></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Inter",sans-serif;
  --font-mono:ui-monospace,"SF Mono",monospace;
  --text-primary:#FAFAFA;--text-secondary:#D1D1D1;--text-tertiary:#A0A0A0;
  --success:#6BE3A4;--warning:#F2C063;--danger:#FF6B6B;
  --card-bg:rgba(255,255,255,0.09);--card-radius:16px;
}
html{background:#1C1E24; scrollbar-gutter: stable;}
body{font-family:var(--font-sans);color:var(--text-primary);background:#1C1E24;
  min-height:100vh;max-width:800px;margin:0 auto;-webkit-font-smoothing:antialiased}

body::before{content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:radial-gradient(ellipse 50% 50% at 82% 14%,rgba(192,132,252,0.12),transparent),
  radial-gradient(ellipse 50% 50% at 18% 90%,rgba(125,211,252,0.08),transparent);
  filter:blur(40px);animation:bgDrift 36s ease-in-out infinite alternate}
@keyframes bgDrift{0%{transform:translate(0,0)}100%{transform:translate(-12px,8px)}}

.page-title{font-size:28px;font-weight:700;letter-spacing:-0.025em;
  background:linear-gradient(180deg,#FFF 0%,#C7C4BC 120%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:16px 0 4px}

/* Horizon Accordions */
.horizon-section { margin-bottom: 12px; }
.horizon-header {
  display: flex; align-items: center; gap: 12px; padding: 14px 18px;
  background: var(--card-bg); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px; cursor: pointer; user-select: none;
  transition: background 0.2s, border-color 0.2s;
}
.horizon-header:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.15); }
.horizon-icon { font-size: 18px; width: 24px; text-align: center; }
.horizon-title { flex: 1; font-size: 14px; font-weight: 700; letter-spacing: 0.02em; }
.horizon-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 6px; }
.horizon-arrow { font-size: 12px; color: var(--text-tertiary); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.horizon-section.collapsed .horizon-arrow { transform: rotate(-90deg); }
.horizon-content { 
  max-height: 2000px; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; 
  padding: 10px 4px 20px;
}
.horizon-section.collapsed .horizon-content { max-height: 0; opacity: 0; padding: 0; pointer-events: none; }

/* Colors for horizons */
.h-week .horizon-icon { color: #6BE3A4; }
.h-month .horizon-icon { color: #7DD3FC; }
.h-quarter .horizon-icon { color: #F2C063; }
.h-year .horizon-icon { color: #C084FC; }
.h-5year .horizon-icon { color: #FF6B6B; }
.h-life .horizon-icon { color: #FAFAFA; }

/* Goal card */
.goal-card{background:rgba(255,255,255,0.04); border-radius:14px;
  border: 1px solid rgba(255,255,255,0.05); padding:14px 16px; margin-bottom:8px;
  transition: transform 0.15s, border-color 0.15s; cursor:pointer}
.goal-card:hover{ border-color:rgba(255,255,255,0.15); transform: translateY(-1px); }
.goal-card.completed{ opacity: 0.6; background: rgba(107,227,164,0.02); }
.goal-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.goal-title{flex:1;font-size:14px;font-weight:600;}
.goal-pct{font-size:13px;font-weight:900;font-family:var(--font-mono);color:var(--success);text-shadow:0 0 10px rgba(107,227,164,0.3)}
.goal-bar-bg{width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;margin-bottom:6px}
.goal-bar-fill{height:100%;border-radius:2px;transition:width 0.4s;background:var(--success)}
.goal-meta{display:flex;align-items:center;justify-content:space-between; font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono)}

/* Add card */
.add-card{background:var(--card-bg); border-radius:var(--card-radius); padding:20px; margin:20px 0 40px; border:1px solid rgba(255,255,255,0.08)}
.add-input{width:100%; padding:12px 16px; border-radius:12px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; outline:none; margin-bottom:12px;}
.add-row-flex { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.add-select { flex: 1; min-width: 120px; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer; outline: none; }
.add-btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(180deg, #fff, #e0e0e0); color: #1c1e24; font-weight: 800; cursor: pointer; transition: transform 0.1s; }
.add-btn-main:active { transform: scale(0.98); }

/* Edit modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:#1C1E24;border-radius:24px;padding:24px;max-width:360px;width:100%;border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 50px rgba(0,0,0,0.5)}
</style>
</head>
<body>

<h1 class="page-title">Горизонты Целей</h1>

<!-- Year Summary with Ring -->
<div class="year-summary-card" style="background: var(--card-bg); border-radius: 20px; padding: 24px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 24px; display: flex; align-items: center; gap: 24px;">
  <div class="year-ring" style="position: relative; width: 80px; height: 80px; flex-shrink: 0;">
    <svg viewBox="0 0 100 100" style="width:100%; height:100%; transform: rotate(-90deg);">
      <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
      <circle id="yearRingFg" cx="50" cy="50" r="42" fill="none" stroke="var(--warning)" stroke-width="8" stroke-linecap="round" transition="stroke-dashoffset 0.8s ease"/>
    </svg>
    <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;">
      <div id="yearPctText" style="font-size: 18px; font-weight: 800; font-family: var(--font-mono);">0%</div>
      <div style="font-size: 7px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase;">ГОД</div>
    </div>
  </div>
  <div style="flex: 1;">
    <div id="yearStatusText" style="font-size: 15px; font-weight: 700; margin-bottom: 4px;">2026 год</div>
    <div id="goalsProgressLabel" style="font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono);">0 из 0 целей выполнено</div>
    <div class="months-grid" id="monthsGrid" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 10px;"></div>
  </div>
</div>

<style>
.month-tag { font-size: 8px; font-weight: 800; text-align: center; padding: 3px 0; border-radius: 4px; background: rgba(255,255,255,0.03); color: var(--text-tertiary); text-transform: uppercase; }
.month-tag.past { text-decoration: line-through; opacity: 0.3; }
.month-tag.current { color: var(--warning); border: 1px solid rgba(242,192,99,0.2); background: rgba(242,192,99,0.05); }
</style>

<div id="horizonsList">
  <!-- Dynamic horizons will be here -->
</div>

<!-- Add Goal -->
<div class="add-card">
  <h3 style="font-size:14px; margin-bottom:14px;">Новая цель</h3>
  <input class="add-input" id="addTitle" type="text" placeholder="Чего хочешь достичь?" autocomplete="off">
  <div class="add-row-flex">
    <select class="add-select" id="addHorizon">
      <option value="week">Неделя</option>
      <option value="month">Месяц</option>
      <option value="quarter">Квартал</option>
      <option value="year" selected>Год</option>
      <option value="5year">5 лет</option>
      <option value="life">Жизнь</option>
    </select>
    <select class="add-select" id="addType">
      <option value="check">Чекбокс</option>
      <option value="number">Числовая</option>
    </select>
  </div>
  <div class="add-row-flex" id="numberFields" style="display:none">
    <input class="add-input" id="addTarget" type="number" placeholder="Цель (число)" style="flex:1; margin-bottom:0">
    <input class="add-input" id="addUnit" type="text" placeholder="ед." style="width:80px; margin-bottom:0">
  </div>
  <button class="add-btn-main" id="addBtn">Создать цель</button>
</div>

<!-- Edit Progress Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h3 id="modalGoalTitle" style="margin-bottom:16px; font-size:16px;"></h3>
    <div style="margin-bottom:12px;">
        <label style="font-size:11px; color:var(--text-tertiary); text-transform:uppercase; font-weight:700;">Прогресс</label>
        <input class="add-input" id="editCurrent" type="number" style="margin-top:6px;">
    </div>
    <div style="display:flex; gap:8px;">
        <button class="add-btn-main" id="saveBtn">Сохранить</button>
        <button class="add-btn-main" id="closeBtn" style="background:rgba(255,255,255,0.05); color:#fff; width:100px;">Отмена</button>
    </div>
    <button id="delBtn" style="width:100%; margin-top:20px; background:none; border:none; color:var(--danger); font-size:11px; cursor:pointer;">Удалить цель навсегда</button>
  </div>
</div>

<script>
(function(){
  'use strict';
  var G = window.Gamification;

  var HORIZONS = [
    { id: 'week',    name: 'Неделя',      icon: '🌱' },
    { id: 'month',   name: 'Месяц',       icon: '📈' },
    { id: 'quarter', name: 'Квартал',     icon: '🏗️' },
    { id: 'year',    name: 'Год',         icon: '🏰' },
    { id: '5year',   name: '5 Лет',       icon: '🌍' },
    { id: 'life',    name: 'Жизнь',       icon: '♾️' }
  ];

  function getData(){
    var d = G.storeGet('horizons_goals_v2');
    if(!d) {
        // Initial migration from old yearly goals
        var old = G.storeGet('yearly_goals_v1') || { goals: [] };
        d = { goals: old.goals.map(function(g){ g.horizon = 'year'; return g; }) || [] };
    }
    return d;
  }
  function setData(d){ G.storeSet('horizons_goals_v2', d); }

  function getCollapsed(){ return G.storeGet('goals_collapsed_v1') || {}; }
  function setCollapsed(c){ G.storeSet('goals_collapsed_v1', c); }

  function updateYearProgress(data) {
    var now = new Date();
    var start = new Date(now.getFullYear(), 0, 1);
    var end = new Date(now.getFullYear() + 1, 0, 1);
    var pct = Math.min(100, Math.max(0, (now - start) / (end - start) * 100));
    
    document.getElementById('yearPctText').textContent = Math.round(pct) + '%';
    
    var ring = document.getElementById('yearRingFg');
    var c = 2 * Math.PI * 42;
    ring.style.strokeDasharray = c;
    ring.style.strokeDashoffset = c - (pct / 100) * c;
    
    document.getElementById('yearStatusText').textContent = now.getFullYear() + ' год';
    
    var goals = data.goals.filter(function(g) { return g.horizon === 'year'; });
    var doneCount = goals.filter(function(g) { return g.done; }).length;
    document.getElementById('goalsProgressLabel').textContent = doneCount + ' из ' + goals.length + ' целей выполнено';
    
    var grid = document.getElementById('monthsGrid');
    var monthNames = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
    var currentMonth = now.getMonth();
    grid.innerHTML = monthNames.map(function(m, i) {
      var cls = 'month-tag';
      if (i < currentMonth) cls += ' past';
      else if (i === currentMonth) cls += ' current';
      return '<div class="' + cls + '">' + m + '</div>';
    }).join('');
  }

  function render(){
    var data = getData();
    updateYearProgress(data);
    var collapsed = getCollapsed();
    var container = document.getElementById('horizonsList');
    container.innerHTML = '';

    HORIZONS.forEach(function(h){
      var goals = data.goals.filter(function(g){ return g.horizon === h.id; });
      var isCollapsed = !!collapsed[h.id];

      var sec = document.createElement('div');
      sec.className = 'horizon-section h-' + h.id + (isCollapsed ? ' collapsed' : '');
      
      sec.innerHTML = `
        <div class="horizon-header" onclick="window.toggleHorizon('${h.id}')">
          <span class="horizon-icon">${h.icon}</span>
          <span class="horizon-title">${h.name}</span>
          <span class="horizon-count">${goals.length}</span>
          <span class="horizon-arrow">▼</span>
        </div>
        <div class="horizon-content" id="content-${h.id}"></div>
      `;

      var content = sec.querySelector('.horizon-content');
      if(goals.length === 0) {
        content.innerHTML = '<div style="text-align:center; padding:20px; font-size:12px; color:var(--text-tertiary);">Нет целей на этот горизонт.</div>';
      } else {
        goals.forEach(function(g){
            var pct = g.type === 'check' ? (g.done?100:0) : Math.min(100, Math.round((g.current||0)/(g.target||1)*100));
            var card = document.createElement('div');
            card.className = 'goal-card' + (g.done?' completed':'');
            card.onclick = () => openEdit(g);
            card.innerHTML = `
                <div class="goal-top">
                    <span class="goal-title">${g.title}</span>
                    <span class="goal-pct">${pct}%</span>
                </div>
                <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
                <div class="goal-meta">
                    <span>${g.type==='number' ? (g.current||0)+' / '+g.target+' '+(g.unit||'') : (g.done?'Выполнено':'В процессе')}</span>
                </div>
            `;
            content.appendChild(card);
        });
      }
      container.appendChild(sec);
    });
  }

  window.toggleHorizon = function(id){
    var c = getCollapsed();
    c[id] = !c[id];
    setCollapsed(c);
    render();
  };

  var editingId = null;
  function openEdit(g){
    editingId = g.id;
    document.getElementById('modalGoalTitle').textContent = g.title;
    document.getElementById('editCurrent').value = g.current || 0;
    document.getElementById('editModal').classList.add('show');
  }

  document.getElementById('closeBtn').onclick = () => document.getElementById('editModal').classList.remove('show');
  document.getElementById('saveBtn').onclick = function(){
    var data = getData();
    var g = data.goals.find(it => it.id === editingId);
    if(g){
        g.current = parseInt(document.getElementById('editCurrent').value, 10) || 0;
        if(g.type === 'number') g.done = g.current >= g.target;
        else g.done = g.current >= 1;
        setData(data);
        render();
    }
    document.getElementById('editModal').classList.remove('show');
  };

  document.getElementById('delBtn').onclick = function(){
    if(!confirm('Удалить эту цель?')) return;
    var data = getData();
    data.goals = data.goals.filter(it => it.id !== editingId);
    setData(data);
    render();
    document.getElementById('editModal').classList.remove('show');
  };

  document.getElementById('addType').onchange = function(){
    document.getElementById('numberFields').style.display = this.value === 'number' ? 'flex' : 'none';
  };

  document.getElementById('addBtn').onclick = function(){
    var title = document.getElementById('addTitle').value.trim();
    if(!title) return;
    var data = getData();
    data.goals.push({
        id: 'hg_'+Date.now(),
        title: title,
        horizon: document.getElementById('addHorizon').value,
        type: document.getElementById('addType').value,
        target: parseInt(document.getElementById('addTarget').value, 10) || 1,
        unit: document.getElementById('addUnit').value || '',
        current: 0,
        done: false
    });
    setData(data);
    document.getElementById('addTitle').value = '';
    render();
  };

  render();
})();
</script>
</body>
</html>
